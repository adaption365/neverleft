<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --canvas:    #1a1a14;
  --canvas-2:  #22221a;
  --canvas-3:  #2c2c22;
  --border:    #3a3a2e;
  --border-l:  #4a4a3a;
  --amber:     #d4902a;
  --amber-l:   #e8a83a;
  --amber-d:   #9a6820;
  --sage:      #6b8c5a;
  --sage-l:    #85a870;
  --rust:      #b85c3a;
  --blue:      #5a7ab8;
  --purple:    #8a6ab8;
  --teal:      #5a9a8a;
  --gold:      #c8a84a;
  --text:      #e8e4d8;
  --text-d:    #9a9488;
  --text-m:    #6a6860;
}
/* ── LIGHT MODE OVERRIDES ── */
body.light {
  --canvas:    #f5f2ea;
  --canvas-2:  #edeadf;
  --canvas-3:  #e4e0d3;
  --border:    #ccc8b8;
  --border-l:  #b8b4a4;
  --amber:     #9a5f10;
  --amber-l:   #b87020;
  --amber-d:   #7a4808;
  --sage:      #4a6b3a;
  --sage-l:    #5a8048;
  --rust:      #9a3c1e;
  --blue:      #3a5a98;
  --purple:    #6a4a98;
  --teal:      #3a7a6a;
  --gold:      #9a7820;
  --text:      #1a1a12;
  --text-d:    #4a4840;
  --text-m:    #6a6858;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--canvas);color:var(--text);min-height:100vh;font-size:14px}

/* ── HEADER */
.hdr{background:var(--canvas-2);border-bottom:2px solid var(--amber-d);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber)}
.logo sup{font-size:9px;color:var(--text-m);font-weight:400;letter-spacing:.15em;margin-left:5px;vertical-align:middle}
.hdr-r{display:flex;gap:5px;align-items:center}

/* ── MAIN TABS */
.mtabs{display:flex;background:var(--canvas-2);border-bottom:1px solid var(--border);padding:0 18px}
.mtab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:10px 15px;border:none;background:transparent;color:var(--text-m);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.mtab:hover{color:var(--text)}
.mtab.on{color:var(--amber);border-bottom-color:var(--amber)}
.tbadge{display:inline-flex;align-items:center;justify-content:center;background:var(--rust);color:#fff;font-size:9px;font-weight:700;width:15px;height:15px;border-radius:50%;margin-left:5px;vertical-align:middle}

/* ── PAGE */
.page{max-width:1080px;margin:0 auto;padding:18px 18px 80px}

/* ── BUTTONS */
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;padding:6px 12px;border-radius:2px;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--amber);color:var(--canvas)}.btn-p:hover{background:var(--amber-l)}
.btn-g{background:var(--sage);color:#fff}.btn-g:hover{background:var(--sage-l)}
.btn-o{background:transparent;color:var(--text-d);border:1px solid var(--border)}.btn-o:hover{border-color:var(--border-l);color:var(--text)}
.btn-x{background:transparent;color:var(--rust);border:1px solid transparent;padding:3px 7px;font-size:10px}.btn-x:hover{border-color:var(--rust)}
.btn-ic{background:transparent;border:none;color:var(--text-m);cursor:pointer;padding:2px 5px;font-size:14px;border-radius:2px;transition:color .15s}.btn-ic:hover{color:var(--amber)}
.btn-sm{padding:4px 9px;font-size:10px}

/* ── STATS */
.stats{display:flex;gap:2px;margin-bottom:18px;background:var(--canvas-3);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.stat{flex:1;padding:9px 12px;border-right:1px solid var(--border)}.stat:last-child{border-right:none}
.stat-v{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--amber);line-height:1}
.stat-l{font-size:9px;color:var(--text-m);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* ── CONTROLS */
.ctrls{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:160px;position:relative}
.sw input{width:100%;background:var(--canvas-2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:6px 9px 6px 28px;border-radius:2px;outline:none;transition:border-color .15s}
.sw input:focus{border-color:var(--amber-d)}
.sw input::placeholder{color:var(--text-m)}
.sw-ic{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text-m);font-size:12px;pointer-events:none}
.fgrp{display:flex;gap:3px;flex-wrap:wrap}
.fb{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:5px 9px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-m);cursor:pointer;transition:all .15s}
.fb:hover{color:var(--text);border-color:var(--border-l)}
.fb.on{background:var(--canvas-3);color:var(--amber);border-color:var(--amber-d)}
select{background:var(--canvas-2);border:1px solid var(--border);color:var(--text-d);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:5px 8px;border-radius:2px;outline:none;cursor:pointer}
select:focus{border-color:var(--amber-d)}

/* ── LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:8px 12px;background:var(--canvas-3);border:1px solid var(--border);border-radius:2px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-m);font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;text-transform:uppercase}
.ld{width:7px;height:7px;border-radius:50%}

/* ── CATEGORY GROUP */
.cg{margin-bottom:18px}
.cg-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.cg-hdr:hover .cg-title{color:var(--text)}
.cg-toggle{font-size:10px;color:var(--text-m);transition:transform .2s;display:inline-block;width:14px}
.cg-toggle.open{transform:rotate(0deg)}
.cg-toggle.closed{transform:rotate(-90deg)}
.cg-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;transition:color .15s}
.cg-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m);background:var(--canvas-3);padding:1px 5px;border-radius:2px}
.cg-body{overflow:hidden;transition:all .2s}

/* ── CAT COLOURS */
.cat-shelter .cg-title{color:#85a870}
.cat-sleep   .cg-title{color:#7a9ab8}
.cat-kitchen .cg-title{color:#c8823a}
.cat-clothing .cg-title{color:#9a8ab8}
.cat-hygiene .cg-title{color:#7ab8a8}
.cat-dog     .cg-title{color:#b8a87a}
.cat-other   .cg-title{color:var(--text-d)}
.cat-wishlist .cg-title{color:var(--gold)}

/* ── ITEM TABLE */
.itbl{width:100%;border-collapse:collapse}
.itbl th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-m);text-align:left;padding:4px 8px;background:var(--canvas-3);border-bottom:1px solid var(--border)}
.irow{border-bottom:1px solid var(--border);transition:background .1s}
.irow:hover{background:var(--canvas-2)}
.irow td{padding:7px 8px;vertical-align:middle}
.irow.sub-row td:first-child{padding-left:28px}
.irow.sub-row{background:rgba(0,0,0,0.04)}
.irow.sub-row:hover{background:rgba(0,0,0,0.07)}
.iname{font-size:13px;font-weight:500;color:var(--text)}
.inotes{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m);margin-top:1px}
.iacts{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.irow:hover .iacts{opacity:1}
.tpill{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:2px;white-space:nowrap}
.tp-always{background:rgba(107,140,90,.15);color:var(--sage);border:1px solid rgba(107,140,90,.3)}
.tp-house{background:rgba(90,122,184,.15);color:var(--blue);border:1px solid rgba(90,122,184,.3)}
.tp-consumable{background:rgba(184,92,58,.15);color:var(--rust);border:1px solid rgba(184,92,58,.3)}
.tp-seasonal{background:rgba(138,106,184,.15);color:var(--purple);border:1px solid rgba(138,106,184,.3)}
.tp-wishlist{background:rgba(200,168,74,.15);color:var(--gold);border:1px solid rgba(200,168,74,.3)}
.lbadge{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:.05em;border:1px solid}
.lb-shed{color:#8a7a5a;border-color:#5a4a2a;background:rgba(138,122,90,.1)}
.lb-duffle{color:#6a9a7a;border-color:#2a5a3a;background:rgba(90,154,122,.1)}
.lb-house{color:#6a8ab8;border-color:#2a4a7a;background:rgba(90,122,184,.1)}
.lb-car{color:#9a8a6a;border-color:#5a4a2a;background:rgba(154,138,106,.1)}
.qc{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:12px}
.qbtn{background:var(--canvas-3);border:1px solid var(--border);color:var(--text-d);width:19px;height:19px;border-radius:2px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.qbtn:hover{border-color:var(--amber-d);color:var(--amber)}
.rflag{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--rust)}
.add-sub-row td{padding:3px 8px 7px 28px}
.add-sub-btn{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);background:transparent;border:1px dashed var(--border);padding:3px 10px;border-radius:2px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .15s}
.add-sub-btn:hover{border-color:var(--amber-d);color:var(--amber)}
.wishlist-item{opacity:.7}
.wishlist-badge{font-size:12px;margin-right:3px}

/* ── EMPTY */
.empty{text-align:center;padding:36px 18px;color:var(--text-m);font-family:'DM Mono',monospace;font-size:12px;border:1px dashed var(--border);border-radius:2px;margin-top:6px}

/* ── MODAL */
.mover{display:none;position:fixed;inset:0;background:rgba(10,10,8,.88);z-index:1000;align-items:center;justify-content:center}
.mover.on{display:flex}
.modal{background:var(--canvas-2);border:1px solid var(--border-l);border-top:3px solid var(--amber);width:500px;max-width:95vw;max-height:92vh;overflow-y:auto;border-radius:3px;padding:20px}
.modal-wide{width:560px}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:16px}
.fg{margin-bottom:11px}
.fl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--text-m);display:block;margin-bottom:3px}
.fi,.fs,.fta{width:100%;background:var(--canvas);border:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;padding:6px 8px;border-radius:2px;outline:none;transition:border-color .15s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--amber-d)}
.fta{resize:vertical;min-height:50px;font-size:12px}
.frow{display:flex;gap:9px}.frow .fg{flex:1}
.factions{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.ck{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text-d)}
.ck input{accent-color:var(--amber);width:13px;height:13px;cursor:pointer}

/* ── TRIP LIST */
.trip-none{text-align:center;padding:44px 20px}
.tn-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-d);margin-bottom:8px}
.tn-sub{font-size:12px;color:var(--text-m);margin-bottom:20px;font-family:'DM Mono',monospace}
.tlist{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.tcard{background:var(--canvas-2);border:1px solid var(--border);border-radius:3px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s}
.tcard:hover{border-color:var(--amber-d)}
.tcard-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;color:var(--text)}
.tcard-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m);margin-top:2px}
.tcard-r{display:flex;gap:7px;align-items:center}
.tstatus{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px}
.ts-planning{background:rgba(90,122,184,.15);color:var(--blue);border:1px solid rgba(90,122,184,.3)}
.ts-packing{background:rgba(212,144,42,.15);color:var(--amber);border:1px solid rgba(212,144,42,.3)}
.ts-complete{background:rgba(107,140,90,.15);color:var(--sage);border:1px solid rgba(107,140,90,.3)}
.ts-post-trip{background:rgba(184,92,58,.15);color:var(--rust);border:1px solid rgba(184,92,58,.3)}

/* ── TRIP DETAIL */
.tdetail{background:var(--canvas-2);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.tdhdr{background:var(--canvas-3);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.tdname{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.08em;color:var(--amber)}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.chip{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-d);background:var(--canvas);border:1px solid var(--border);padding:1px 7px;border-radius:2px}
.ttabs{display:flex;border-bottom:1px solid var(--border);background:var(--canvas-3)}
.ttab{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 13px;border:none;background:transparent;color:var(--text-m);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.ttab:hover{color:var(--text)}
.ttab.on{color:var(--amber);border-bottom-color:var(--amber)}
.tbody{padding:14px 16px}

/* ── CHECKLIST PROGRESS */
.cprog{background:var(--canvas-3);border:1px solid var(--border);border-radius:2px;padding:10px 14px;margin-bottom:14px}
.cprog-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px}
.cprog-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-d)}
.cprog-pcts{display:flex;gap:10px}
.cprog-pct{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;line-height:1}
.pct-ready{color:var(--amber)}
.pct-packed{color:var(--sage)}
.pbar-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex}
.pbar-ready{height:100%;background:var(--amber);transition:width .3s}
.pbar-packed{height:100%;background:var(--sage);transition:width .3s}
.cprog-hint{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);margin-top:5px;letter-spacing:.05em}

/* ── CHECKLIST ITEMS */
.cloc-group{margin-bottom:18px}
.cloc-hdr{display:flex;align-items:center;gap:7px;padding:5px 0;margin-bottom:5px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.cloc-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-m)}
.ci{display:flex;align-items:flex-start;gap:8px;padding:6px 5px;border-radius:2px;transition:background .1s;border-bottom:1px solid rgba(58,58,46,.4)}
.ci:hover{background:var(--canvas-3)}
.ci.hl{background:rgba(212,144,42,.07);border-left:2px solid var(--amber-d);padding-left:7px}
.ci.sub-ci{padding-left:22px}
.ci.sub-ci.hl{padding-left:24px}
.ci-state{width:22px;height:22px;border-radius:3px;border:1px solid var(--border);background:var(--canvas-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;transition:all .15s;user-select:none}
.ci-state:hover{border-color:var(--amber-d)}
.ci-state.ready{background:rgba(212,144,42,.2);border-color:var(--amber);color:var(--amber)}
.ci-state.packed{background:rgba(107,140,90,.25);border-color:var(--sage);color:var(--sage)}
.ci-body{flex:1}
.ci-name{font-size:12px;font-weight:500;transition:opacity .15s}
.ci-name.packed{text-decoration:line-through;opacity:.4}
.ci-name.ready{opacity:.75}
.ci-meta{display:flex;gap:4px;align-items:center;margin-top:2px;flex-wrap:wrap}
.ci-qty{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m)}
.ci-note{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m)}
.hl-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);background:rgba(212,144,42,.12);border:1px solid rgba(212,144,42,.3);padding:1px 4px;border-radius:2px}

/* ── POST TRIP */
.pt-banner{background:rgba(184,92,58,.07);border:1px solid rgba(184,92,58,.3);border-left:3px solid var(--rust);border-radius:2px;padding:12px 14px;margin-bottom:14px}
.pt-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rust);margin-bottom:3px}
.pt-sub{font-size:11px;color:var(--text-m);font-family:'DM Mono',monospace}

/* ── TRIP NOTES */
.tnotes-area{width:100%;background:var(--canvas);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:9px 11px;border-radius:2px;outline:none;resize:vertical;min-height:80px;transition:border-color .15s}
.tnotes-area:focus{border-color:var(--amber-d)}

/* ── RESTOCK */
.rs-panel{background:var(--canvas-2);border:1px solid var(--border);border-radius:3px;padding:14px}

/* ── ACTIVITIES GRID */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px;margin-top:3px}
.atog{display:flex;align-items:center;gap:5px;padding:5px 8px;background:var(--canvas);border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:11px;color:var(--text-d);transition:all .15s;user-select:none}
.atog:hover{border-color:var(--border-l);color:var(--text)}
.atog.on{background:rgba(212,144,42,.1);border-color:var(--amber-d);color:var(--amber)}
.atog input{accent-color:var(--amber);cursor:pointer}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── PRINT ── */
@media print{
  body{background:#fff!important;color:#000!important;font-size:11pt}
  .hdr,.mtabs,.ctrls,.legend,.stats,.no-print{display:none!important}
  .page{display:none!important}
  #printView{display:block!important;max-width:100%;padding:0}
  .print-title{font-family:'Barlow Condensed',sans-serif;font-size:18pt;font-weight:700;text-transform:uppercase;margin-bottom:4pt;letter-spacing:.1em}
  .print-sub{font-size:9pt;color:#666;margin-bottom:12pt}
  .print-group{margin-bottom:14pt;break-inside:avoid}
  .print-group-title{font-family:'Barlow Condensed',sans-serif;font-size:11pt;font-weight:700;text-transform:uppercase;letter-spacing:.12em;border-bottom:1pt solid #000;padding-bottom:3pt;margin-bottom:6pt}
  .print-item{display:flex;align-items:flex-start;gap:8pt;padding:3pt 0;border-bottom:.5pt solid #ddd;break-inside:avoid}
  .print-cb{width:12pt;height:12pt;border:1pt solid #000;flex-shrink:0;margin-top:1pt}
  .print-item-name{font-size:10pt;font-weight:600;flex:1}
  .print-item-meta{font-size:8pt;color:#555;margin-top:1pt}
  .print-action{display:flex;align-items:center;gap:6pt;padding:2pt 0 2pt 20pt;border-bottom:.5pt solid #eee}
  .print-action-cb{width:9pt;height:9pt;border:.5pt solid #999;flex-shrink:0}
  .print-action-label{font-size:9pt;color:#333}
  .print-action-stage{font-size:8pt;color:#777;min-width:60pt}

<script>
// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
const SK = 'basecamp_v3';
let S = { items:[], trips:[] };
let editItemId = null, editTripId = null;
let tf = 'all', mainTab = 'trips';
let activeTripId = null, activeTripTab = 'checklist';
let collapsedCats = new Set();   // inventory
let collapsedLocs = new Set();   // checklist locations
let personFilter = 'all';        // inventory person filter
let checklistPersonFilter = 'all'; // checklist person filter
let checklistLocFilter = 'all';    // checklist location filter
let checklistSort = 'location';    // checklist sort order
let checklistHidePacked = false;   // hide packed items
let checklistFiltersOpen = false;  // filter panel open state

const CATS    = ['shelter','sleep','kitchen','clothing','hygiene','dog','other'];
const CLAB    = { shelter:'⛺ Shelter', sleep:'🛌 Sleep', kitchen:'🍳 Kitchen', clothing:'🧥 Clothing', hygiene:'🪥 Hygiene', dog:'🐕 Dog', other:'📦 Other' };
const TLAB    = { always:'Always in kit', house:'Bring from home', consumable:'Needs restocking', seasonal:'Seasonal', wishlist:'Want list' };
const LLAB    = { shed:'Shed', duffle:'Duffle Bag', house:'House', car:'Car' };
const SELAB   = { summer:'Summer', shoulder:'Shoulder', winter:'Winter', all:'All' };
const SITELAB = { hookup:'Full hookup', basic:'Basic', wild:'Wild' };
const DISTLAB = { local:'Local', regional:'Regional', remote:'Remote' };
const STLAB   = { planning:'Planning', packing:'Packing', 'pack-up':'Pack up camp', 'pack-away':'Unpack at home', 'post-trip':'Back home', complete:'Done' };
const PERSON_COLORS = ['#d4902a','#6b8c5a','#5a7ab8','#b85c3a','#8a6ab8','#5a9a8a','#c8a84a','#b8a87a'];

// ══════════════════════════════════════════════════
// SETTINGS DEFAULTS & HELPERS
// ══════════════════════════════════════════════════
function defaultSettings(){
  return {
    categories:[
      {id:'shelter', label:'Shelter', emoji:'⛺'},
      {id:'sleep',   label:'Sleep',   emoji:'🛌'},
      {id:'kitchen', label:'Kitchen', emoji:'🍳'},
      {id:'clothing',label:'Clothing',emoji:'🧥'},
      {id:'hygiene', label:'Hygiene', emoji:'🪥'},
      {id:'dog',     label:'Dog',     emoji:'🐕'},
      {id:'other',   label:'Other',   emoji:'📦'},
    ],
    locations:[
      {id:'shed',   label:'Shed',       isStorageLoc:true, isPackInto:false},
      {id:'duffle', label:'Duffle Bag', isStorageLoc:true, isPackInto:true},
      {id:'house',  label:'House',      isStorageLoc:true, isPackInto:false},
      {id:'car',    label:'Car',        isStorageLoc:true, isPackInto:true},
    ],
    activities:[
      {id:'hiking',   label:'Hiking',   emoji:'🥾'},
      {id:'beach',    label:'Beach',    emoji:'🏖'},
      {id:'cycling',  label:'Cycling',  emoji:'🚴'},
      {id:'fishing',  label:'Fishing',  emoji:'🎣'},
      {id:'swimming', label:'Swimming', emoji:'🏊'},
      {id:'climbing', label:'Climbing', emoji:'🧗'},
    ]
  };
}

// Live accessors — always read from S.settings so changes are instant
// Defensive: fall back to defaults if settings not yet loaded
function showToast(msg){
  // Remove any existing toast
  const existing=document.getElementById('bcToast');
  if(existing) existing.remove();
  const t=document.createElement('div');
  t.id='bcToast';
  t.textContent=msg;
  t.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--canvas-3);color:var(--text);border:1px solid var(--rust);border-left:3px solid var(--rust);padding:10px 16px;border-radius:3px;font-size:12px;font-family:Nunito,sans-serif;z-index:9999;max-width:90vw;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.3)";
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); },3000);
}

function getCats(){ return (S.settings&&S.settings.categories)||defaultSettings().categories; }
function getLocs(){ return (S.settings&&S.settings.locations)||defaultSettings().locations; }
function getActs(){ return (S.settings&&S.settings.activities)||defaultSettings().activities; }
// Storage locations (shown in inventory location dropdown + checklist grouping)
function getStorageLocs(){ return getLocs().filter(l=>l.isStorageLoc!==false); }
// Pack-into locations (shown in packs-into dropdown)
function getPackIntoLocs(){ return getLocs().filter(l=>l.isPackInto===true); }

// Build a label map from a settings array
function labMap(arr){ const m={}; arr.forEach(x=>m[x.id]=x.label); return m; }
// Build an emoji+label map
function emojiLabMap(arr){ const m={}; arr.forEach(x=>m[x.id]=(x.emoji?x.emoji+' ':'')+x.label); return m; }

// ══════════════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════════════
function load(){
  try{
    const r=localStorage.getItem(SK);
    if(r){
      S=JSON.parse(r);
    } else {
      // First launch — load demo data and flag it
      const demo=demoData();
      S={ items:demo.items, trips:demo.trips, people:demo.people, settings:demo.settings };
      localStorage.setItem('basecamp_demo','1');
      save();
    }
    if(!S.items) S.items=[];
    if(!S.trips) S.trips=[];
    if(!S.people) S.people=[];
    if(!S.settings) S.settings=defaultSettings();
    else {
      if(!S.settings.categories||!S.settings.categories.length) S.settings.categories=defaultSettings().categories;
      if(!S.settings.locations||!S.settings.locations.length)   S.settings.locations=defaultSettings().locations;
      else S.settings.locations=S.settings.locations.map(l=>({isStorageLoc:true,...l}));
      if(!S.settings.activities||!S.settings.activities.length) S.settings.activities=defaultSettings().activities;
    }
  }catch(e){
    const demo=demoData();
    S={ items:demo.items, trips:demo.trips, people:demo.people, settings:demo.settings };
  }
}

function initDemoBanner(){
  if(localStorage.getItem('basecamp_demo')==='1'){
    const b=document.getElementById('demoBanner');
    if(b) b.style.display='flex';
  }
}

function dismissDemoBanner(){
  const b=document.getElementById('demoBanner');
  if(b) b.style.display='none';
}

function clearDemoData(){
  if(!confirm('Clear all demo data and start fresh? This cannot be undone.')) return;
  resetAllData();
}

function resetAllData(){
  // Clear all user data — preserve theme and backup timestamp
  const theme=localStorage.getItem('basecamp_theme');
  const lastExport=localStorage.getItem('basecamp_last_export');
  localStorage.clear();
  if(theme) localStorage.setItem('basecamp_theme',theme);
  if(lastExport) localStorage.setItem('basecamp_last_export',lastExport);
  S={ items:[], trips:[], people:[], settings:defaultSettings() };
  save();
  dismissDemoBanner();
  renderAll();
  alert('\u2713 All data cleared. You\'re starting fresh.');
}

function loadDemoDataAgain(){
  if(!confirm('Load demo data? This will replace your current data.')) return;
  const demo=demoData();
  S={ items:demo.items, trips:demo.trips, people:demo.people, settings:demo.settings };
  localStorage.setItem('basecamp_demo','1');
  save();
  const b=document.getElementById('demoBanner');
  if(b) b.style.display='flex';
  renderAll();
}
function save(){ localStorage.setItem(SK,JSON.stringify(S)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){ if(!d)return''; try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;} }

// ══════════════════════════════════════════════════
// ITEM HELPERS
// ══════════════════════════════════════════════════
function topItems(){ return S.items.filter(i=>!i.parentId && i.type!=='wishlist'); }
function subItems(parentId){ return S.items.filter(i=>i.parentId===parentId); }
function wishItems(){ return S.items.filter(i=>i.type==='wishlist'); }

function isExcluded(item, trip){
  if(item.type==='wishlist') return true;
  if(item.category==='dog' && !trip.dog) return true;
  if(item.season && item.season!=='all'){
    if(item.season==='summer' && trip.season!=='summer') return true;
    if(item.season==='winter' && trip.season!=='winter') return true;
    if(item.season==='shoulder' && trip.season==='summer') return true;
  }
  if(item.activity && (!trip.activities||!trip.activities.includes(item.activity))) return true;
  return false;
}

function getHL(trip){
  const h={};
  S.items.forEach(item=>{
    const r=[];
    if(item.activity && trip.activities && trip.activities.includes(item.activity)) r.push(item.activity);
    if(trip.distance==='remote'){
      if(/first.aid|spare/i.test(item.name+(item.notes||''))) r.push('remote');
      if(item.type==='consumable' && item.category==='hygiene') r.push('remote');
    }
    if(trip.site==='wild' && /water|toilet|trowel/i.test(item.name)) r.push('wild');
    if(r.length) h[item.id]=r;
  });
  return h;
}

function adjQty(item, trip){
  if(item.type!=='consumable') return item.qty;
  const n=trip.nights||3;
  if(/toilet.roll/i.test(item.name)) return Math.ceil(n/2)+(trip.distance==='remote'?1:0);
  if(/gas/i.test(item.name)) return Math.max(1,Math.ceil(n/3))+(trip.distance==='remote'?1:0);
  if(/dog.food/i.test(item.name)) return n+1;
  return item.qty;
}

// ══════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════
function renderStats(){
  const top=topItems();
  const rc=top.filter(i=>i.restock||i.qty===0).length;
  const ac=S.trips.filter(t=>t.status==='packing'||t.status==='planning').length;
  const wc=wishItems().length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-v">${top.length}</div><div class="stat-l">Items</div></div>
    <div class="stat"><div class="stat-v">${top.filter(i=>i.type==='always').length}</div><div class="stat-l">Always in kit</div></div>
    <div class="stat"><div class="stat-v">${top.filter(i=>i.type==='house').length}</div><div class="stat-l">From home</div></div>
    <div class="stat"><div class="stat-v" style="${rc>0?'color:var(--rust)':''}">${rc}</div><div class="stat-l">Restock</div></div>
    <div class="stat"><div class="stat-v" style="${ac>0?'color:var(--amber)':''}">${ac}</div><div class="stat-l">Active Trips</div></div>
    <div class="stat"><div class="stat-v" style="${wc>0?'color:var(--gold)':''}">${wc}</div><div class="stat-l">Want list</div></div>`;
  // badges — restockBtn removed from nav, show restock count on My Kit filter toggle
  const rb=document.getElementById('restockBtn');
  if(rb){ rb.querySelectorAll('.tbadge').forEach(b=>b.remove()); if(rc>0) rb.innerHTML+=`<span class="tbadge">${rc}</span>`; }
  // Show restock count on filter toggle button in My Kit
  const ftb=document.getElementById('filterToggleBtn');
  if(ftb){ ftb.querySelectorAll('.tbadge').forEach(b=>b.remove()); if(rc>0) ftb.innerHTML=`⚙ Filter <span class="tbadge" style="background:var(--rust)">${rc}</span>`; else ftb.textContent='⚙ Filter'; }
  const wb=document.getElementById('wishBtn');
  if(wb){ wb.querySelectorAll('.tbadge').forEach(b=>b.remove()); if(wc>0) wb.innerHTML+=`<span class="tbadge" style="background:var(--gold)">${wc}</span>`; }
}

// ══════════════════════════════════════════════════
// INVENTORY
// ══════════════════════════════════════════════════
function toggleKitFilters(){
  const el=document.getElementById('kitFilters');
  const btn=document.getElementById('filterToggleBtn');
  const open=el.style.display==='block';
  el.style.display=open?'none':'block';
  btn.style.background=open?'':'var(--canvas-3)';
  btn.style.color=open?'':'var(--amber)';
  btn.style.borderColor=open?'':'var(--amber-d)';
}

function itemMatchesPerson(item, pid){
  // Does this item or any of its sub-items match the person filter?
  if(pid==='all') return true;
  if((item.personIds||[]).includes(pid)) return true;
  return subItems(item.id).some(s=>(s.personIds||[]).includes(pid));
}

function renderInv(){
  populateDynamicDropdowns(null, null, null); // keep locF in sync
  const srch=document.getElementById('srch').value.toLowerCase();
  const lf=document.getElementById('locF').value;
  const sort=document.getElementById('sortS').value;
  let items=topItems().filter(i=>{
    const textMatch=!srch||i.name.toLowerCase().includes(srch)||(i.notes||'').toLowerCase().includes(srch)
      ||subItems(i.id).some(s=>s.name.toLowerCase().includes(srch)||(s.notes||'').toLowerCase().includes(srch));
    const pMatch=itemMatchesPerson(i, personFilter);
    return textMatch
      &&(tf==='all'||i.type===tf)
      &&(lf==='all'||i.location===lf)
      &&pMatch;
  });
  if(sort==='name') items.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='location') items.sort((a,b)=>a.location.localeCompare(b.location));
  else if(sort==='restock') items.sort((a,b)=>((b.restock||b.qty===0)?1:0)-((a.restock||a.qty===0)?1:0));
  else items.sort((a,b)=>getCats().findIndex(c=>c.id===a.category)-getCats().findIndex(c=>c.id===b.category)||a.name.localeCompare(b.name));

  const el=document.getElementById('invContent');
  if(!items.length){ el.innerHTML=`<div class="empty">No items match — adjust filters or add one above.</div>`; return; }

  if(sort==='category'){
    const g={};
    items.forEach(i=>{ if(!g[i.category])g[i.category]=[]; g[i.category].push(i); }); // keyed by id
    el.innerHTML=getCats().filter(c=>g[c.id]?.length).map(c=>{
      const open=!collapsedCats.has(c.id);
      return `<div class="cg cat-${c.id}">
        <div class="cg-hdr" onclick="toggleCat('${c.id}')">
          <span class="cg-toggle ${open?'open':'closed'}">▼</span>
          <span class="cg-title">${c.emoji||''} ${c.label}</span>
          <span class="cg-count">${g[c.id].length}</span>
        </div>
        <div class="cg-body" id="cgb-${c.id}" style="display:${open?'block':'none'}">
          ${invTable(g[c.id])}
        </div>
      </div>`;
    }).join('');
  } else {
    el.innerHTML=invTable(items);
  }
}

function invTable(rows){
  return `<table class="itbl">
    <thead><tr><th style="width:38%">Item</th><th>Type</th><th>Location</th><th>Qty</th><th></th></tr></thead>
    <tbody>${rows.map(item=>itemRow(item,false)).join('')}</tbody>
  </table>`;
}

function itemRow(item, isSub){
  // When filtering by person, only show sub-items that match
  const allSubs=subItems(item.id);
  const subs=personFilter==='all'?allSubs:allSubs.filter(s=>(s.personIds||[]).includes(personFilter));
  const restock=item.restock||item.qty===0;
  const isWish=item.type==='wishlist';
  const assignedPeople=(S.people||[]).filter(p=>(item.personIds||[]).includes(p.id));
  const personBadges=assignedPeople.map(p=>`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;border-radius:10px;background:${p.color}22;color:${p.color};border:1px solid ${p.color}55;margin-left:4px">${p.name}</span>`).join('');
  return `
    <tr class="irow${isSub?' sub-row':''}${isWish?' wishlist-item':''}">
      <td>
        <div class="iname">${isWish?`<span class="wishlist-badge">✦</span>`:''}${esc(item.name)}${restock?` <span class="rflag">⚠ restock</span>`:''}${personBadges}</div>
        ${item.notes?`<div class="inotes">${esc(item.notes)}</div>`:''}
        ${item.activity?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:.06em">${item.activity}</span>`:''}
        ${item.isContainer?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--amber-d);text-transform:uppercase;letter-spacing:.06em">⊞ group</span>`:''}
        ${(item.actions&&item.actions.length)?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:.06em">⚡ ${item.actions.length} action${item.actions.length!==1?'s':''}</span>`:''}
        ${item.packsInto&&item.packsInto!==item.location?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-m)">→ ${labMap(getLocs())[item.packsInto]||item.packsInto}</span>`:''}
      </td>
      <td><span class="tpill tp-${item.type}">${TLAB[item.type]}</span></td>
      <td><span class="lbadge lb-${item.location}">${labMap(getLocs())[item.location]||item.location}</span></td>
      <td>${item.type==='consumable'?`
        <div class="qc">
          <button class="qbtn" onclick="qAdj('${item.id}',-1)">−</button>
          <span id="qv-${item.id}">${item.qty}</span>
          <button class="qbtn" onclick="qAdj('${item.id}',+1)">+</button>
        </div>`:`<span style="font-family:'DM Mono',monospace;color:var(--text-m)">${item.qty}</span>`}
      </td>
      <td style="position:relative">
        <button class="btn-ic" style="font-size:14px;padding:2px 8px;border:1px solid var(--border);border-radius:2px" onclick="toggleRowMenu('${item.id}',event)">•••</button>
        <div id="rmenu-${item.id}" style="display:none;position:absolute;right:0;top:100%;margin-top:2px;background:var(--canvas-3);border:1px solid var(--border-l);border-radius:3px;z-index:50;min-width:110px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.4)">
          <button onclick="closeRowMenu('${item.id}');openEditItemModal('${item.id}')" style="display:block;width:100%;padding:8px 14px;background:transparent;border:none;color:var(--text);font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-align:left;cursor:pointer;text-transform:uppercase">✎ Edit</button>
          <button onclick="closeRowMenu('${item.id}');delItem('${item.id}')" style="display:block;width:100%;padding:8px 14px;background:transparent;border:none;color:var(--rust);font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-align:left;cursor:pointer;text-transform:uppercase">✕ Delete</button>
        </div>
      </td>
    </tr>
    ${!isSub&&subs.length?`<tr class="irow"><td colspan="5" style="padding:1px 9px 1px 28px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-m);letter-spacing:.08em;text-transform:uppercase">includes:</td></tr>`:''}
    ${subs.map(s=>itemRow(s,true)).join('')}
    ${!isSub?`<tr class="irow add-sub-row"><td colspan="5"><button class="add-sub-btn" onclick="openAddSubModal('${item.id}')">+ add to group</button></td></tr>`:''}
  `;
}

function toggleCIMenu(id, e){
  e.stopPropagation();
  const el=document.getElementById(id);
  if(!el) return;
  const wasOpen=el.style.display==='block';
  document.querySelectorAll('[id^="ci-menu-"]').forEach(m=>m.style.display='none');
  if(!wasOpen) el.style.display='block';
}
function closeCIMenu(id){
  const el=document.getElementById(id);
  if(el) el.style.display='none';
}
document.addEventListener('click',()=>document.querySelectorAll('[id^="ci-menu-"]').forEach(m=>m.style.display='none'));

function toggleRowMenu(id, e){
  e.stopPropagation();
  const el=document.getElementById('rmenu-'+id);
  const wasOpen=el.style.display==='block';
  // close all open menus first
  document.querySelectorAll('[id^="rmenu-"]').forEach(m=>m.style.display='none');
  if(!wasOpen) el.style.display='block';
}
function closeRowMenu(id){ const el=document.getElementById('rmenu-'+id); if(el) el.style.display='none'; }
document.addEventListener('click',()=>document.querySelectorAll('[id^="rmenu-"]').forEach(m=>m.style.display='none'));

function toggleCat(c){
  if(collapsedCats.has(c)) collapsedCats.delete(c);
  else collapsedCats.add(c);
  renderInv();
}

function renderTrips(){
  const el=document.getElementById('tripsContent');
  if(activeTripId){
    const trip=S.trips.find(t=>t.id===activeTripId);
    if(trip){ el.innerHTML=tripDetail(trip); return; }
    activeTripId=null;
  }

  // Empty state — warm and inviting
  if(!S.trips.length){
    el.innerHTML=`
      <div style="text-align:center;padding:40px 20px 30px">
        <div style="font-size:52px;margin-bottom:12px;line-height:1">⛺</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.06em;color:var(--ink,var(--text));margin-bottom:8px">Where are you heading?</div>
        <div style="font-size:13px;color:var(--text-m);margin-bottom:24px;line-height:1.6;max-width:280px;margin-left:auto;margin-right:auto">Plan a trip and Base Camp will help you pack everything you need — stress free.</div>
        <button class="btn btn-p" style="font-size:13px;padding:10px 24px" onclick="openNewTripModal()">Plan my first trip →</button>
      </div>`; return;
  }

  // Sort: upcoming first, then by date, complete/post-trip at bottom
  const statusOrder={'planning':0,'packing':1,'pack-up':2,'pack-away':3,'post-trip':4,'complete':5};
  const sorted=[...S.trips].sort((a,b)=>{
    const ao=statusOrder[a.status]??3, bo=statusOrder[b.status]??3;
    if(ao!==bo) return ao-bo;
    return (a.date||'9999')<(b.date||'9999')?-1:1;
  });

  // Upcoming = first non-complete trip
  const upcoming=sorted.find(t=>t.status!=='complete');
  const rest=sorted.filter(t=>t!==upcoming);

  function countdown(dateStr){
    if(!dateStr) return null;
    const diff=Math.ceil((new Date(dateStr+'T12:00:00')-new Date())/(1000*60*60*24));
    if(diff<0) return null;
    if(diff===0) return 'Today!';
    if(diff===1) return 'Tomorrow';
    return diff+' days to go';
  }

  function peopleAvatars(trip){
    if(!S.people||!S.people.length) return '';
    return `<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:6px">
      ${S.people.map(p=>`<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${p.color}33;border:1.5px solid ${p.color};font-size:13px" title="${esc(p.name)}">${p.emoji||'👤'}</span>`).join('')}
      ${trip.dog?`<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#c8a84a33;border:1.5px solid #c8a84a;font-size:13px">🐕</span>`:''}
    </div>`;
  }

  function packProgress(t){
    if(!t.checklist||!t.checklist.length) return '';
    const cl=t.checklist.filter(c=>{const it=S.items.find(i=>i.id===c.itemId);return it&&it.type!=='wishlist';});
    const packed=cl.filter(c=>c.state==='packed').length;
    const ready=cl.filter(c=>c.state==='ready').length;
    const total=cl.length;
    const pct=total?Math.round((packed+ready)/total*100):0;
    return `<div style="margin-top:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m)">${packed} packed · ${ready} ready · ${total-(packed+ready)} to go</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--sage)">${pct}%</span>
      </div>
      <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:flex">
        <div style="width:${Math.round(packed/total*100)}%;background:var(--sage);transition:width .3s"></div>
        <div style="width:${Math.round(ready/total*100)}%;background:var(--amber);transition:width .3s"></div>
      </div>
    </div>`;
  }

  // Hero card for upcoming trip
  const heroHtml=upcoming?`
    <div onclick="openTrip('${upcoming.id}')" style="background:var(--canvas-2);border:1.5px solid var(--amber-d);border-radius:8px;padding:18px;margin-bottom:16px;cursor:pointer;position:relative;overflow:hidden">
      <div style="position:absolute;right:12px;top:12px;font-size:36px;opacity:.08;line-height:1;pointer-events:none">⛺</div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
        <span class="tstatus ts-${upcoming.status}">${STLAB[upcoming.status]||upcoming.status}</span>
        ${countdown(upcoming.date)?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--amber);letter-spacing:.06em">${countdown(upcoming.date)}</span>`:''}
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.04em;color:var(--text);line-height:1.1;margin-bottom:3px">${esc(upcoming.name)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m)">${upcoming.date?fmtDate(upcoming.date)+' · ':''}${upcoming.nights} night${upcoming.nights!==1?'s':''} · ${SELAB[upcoming.season]||''} · ${SITELAB[upcoming.site]||''}</div>
      ${peopleAvatars(upcoming)}
      ${packProgress(upcoming)}
      <div style="margin-top:12px;display:flex;gap:7px">
        <button class="btn btn-p btn-sm" onclick="event.stopPropagation();openTrip('${upcoming.id}')">Open trip →</button>
        ${upcoming.status==='planning'?`<button class="btn btn-o btn-sm" onclick="event.stopPropagation();startPacking('${upcoming.id}')">Start packing</button>`:''}
      </div>
    </div>`:' ';

  // Remaining trips as compact cards
  const restHtml=rest.length?`
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-m);margin-bottom:8px">${upcoming?'Other trips':'All trips'}</div>
    <div class="tlist">${rest.map(t=>`
      <div class="tcard" onclick="openTrip('${t.id}')">
        <div>
          <div class="tcard-name">${esc(t.name)}</div>
          <div class="tcard-meta">${t.date?fmtDate(t.date)+' · ':''}${t.nights}n · ${SELAB[t.season]||''}${t.dog?' · 🐕':''}</div>
        </div>
        <div class="tcard-r">
          ${t.checklist?`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m)">${t.checklist.filter(c=>c.state==='packed').length}/${t.checklist.length}</span>`:''}
          <span class="tstatus ts-${t.status}">${STLAB[t.status]||t.status}</span>
        </div>
      </div>`).join('')}
    </div>`:'';

  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-d)">My Trips</span>
      <button class="btn btn-p btn-sm" onclick="openNewTripModal()">+ New Trip</button>
    </div>
    ${heroHtml}
    ${restHtml}`;
}

function tripDetail(trip){
  const hl=getHL(trip);
  const cl=trip.checklist||[];
  // Count only items that exist in S.items and aren't wishlist
  const validCl=cl.filter(c=>{
    const it=S.items.find(i=>i.id===c.itemId);
    return it&&it.type!=='wishlist';
  });
  const ready=validCl.filter(c=>c.state==='ready').length;
  const packed=validCl.filter(c=>c.state==='packed').length;
  const total=validCl.length;
  const pctR=total?Math.round((ready+packed)/total*100):0;
  const pctP=total?Math.round(packed/total*100):0;

  const chips=[
    `${trip.nights}n`, SELAB[trip.season], SITELAB[trip.site], DISTLAB[trip.distance],
    trip.dog?'🐕 Dog':'No dog',
    ...(trip.activities||[]).map(a=>`🏷 ${a}`),
    trip.extraPeople>0?`+${trip.extraPeople} extra`:null
  ].filter(Boolean);

  let body='';
  if(activeTripTab==='checklist')  body=checklistBody(trip,hl,ready,packed,total,pctR,pctP);
  else if(activeTripTab==='pack-up')   body=packUpBody(trip);
  else if(activeTripTab==='pack-away') body=packAwayBody(trip);
  else if(activeTripTab==='actions')   body=actionsBody(trip);
  else if(activeTripTab==='post-trip') body=postTripBody(trip);
  else body=notesBody(trip);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button class="btn btn-o btn-sm" onclick="closeTrip()">← All Trips</button>
      <div style="display:flex;gap:5px">
        <button class="btn btn-o btn-sm" onclick="openEditTripModal('${trip.id}')">✎ Edit</button>
        <button class="btn btn-x" onclick="delTrip('${trip.id}')">Delete</button>
      </div>
    </div>
    <div class="tdetail">
      <div class="tdhdr">
        <div>
          <div class="tdname">${esc(trip.name)}</div>
          ${trip.date?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m);margin-top:1px">${fmtDate(trip.date)}</div>`:''}
          <div class="chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <select class="fs" style="font-size:11px;padding:4px 8px;text-transform:uppercase;letter-spacing:.08em" onchange="setTripStatusFromDropdown('${trip.id}',this.value)">
            <option value="planning"  ${trip.status==='planning'?'selected':''}>Planning</option>
            <option value="packing"   ${trip.status==='packing'?'selected':''}>Packing</option>
            <option value="pack-up"   ${trip.status==='pack-up'?'selected':''}>Pack up camp</option>
            <option value="pack-away" ${trip.status==='pack-away'?'selected':''}>Unpack at home</option>
            <option value="post-trip" ${trip.status==='post-trip'?'selected':''}>Back home</option>
            <option value="complete"  ${trip.status==='complete'?'selected':''}>Complete</option>
          </select>
          ${statusBtn(trip)}
        </div>
      </div>
      <div class="ttabs">
        <button class="ttab ${activeTripTab==='checklist'?'on':''}" onclick="setTripTab('checklist')">Packing list</button>
        <button class="ttab ${activeTripTab==='pack-up'?'on':''}" onclick="setTripTab('pack-up')">Pack up camp</button>
        <button class="ttab ${activeTripTab==='pack-away'?'on':''}" onclick="setTripTab('pack-away')">Unpack at home</button>
        <button class="ttab ${activeTripTab==='actions'?'on':''}" onclick="setTripTab('actions')">Reminders</button>
        <button class="ttab ${activeTripTab==='post-trip'?'on':''}" onclick="setTripTab('post-trip')">Back home</button>
        <button class="ttab ${activeTripTab==='notes'?'on':''}" onclick="setTripTab('notes')">Notes</button>
      </div>
      <div class="tbody">${body}</div>
    </div>`;
}

function statusBtn(trip){
  if(trip.status==='planning')  return `<button class="btn btn-p btn-sm" onclick="startPacking('${trip.id}')">Start packing →</button>`;
  if(trip.status==='packing')   return `<button class="btn btn-p btn-sm" onclick="advanceStatus('${trip.id}','pack-up','pack-up')">At camp — Pack up camp →</button>`;
  if(trip.status==='pack-up')   return `<button class="btn btn-p btn-sm" onclick="advanceStatus('${trip.id}','pack-away','pack-away')">Home — Pack Away →</button>`;
  if(trip.status==='pack-away') return `<button class="btn btn-g btn-sm" onclick="advanceStatus('${trip.id}','post-trip','post-trip')">Done — Post-trip →</button>`;
  return '';
}

function advanceStatus(tripId, status, tab){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  trip.status=status;
  activeTripTab=tab;
  save(); renderTrips();
}

function setTripStatusFromDropdown(tripId, status){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  trip.status=status;
  if(status==='packing' && !trip.checklist) genChecklist(tripId);
  if(status==='pack-up')   activeTripTab='pack-up';
  if(status==='pack-away') activeTripTab='pack-away';
  if(status==='post-trip') activeTripTab='post-trip';
  save(); renderTrips();
}

function checklistBody(trip,hl,ready,packed,total,pctR,pctP){
  const cl=trip.checklist||[];
  if(!cl.length) return `
    <div class="empty">
      No checklist yet.<br>
      <button class="btn btn-p" style="margin-top:10px" onclick="genChecklist('${trip.id}')">Generate Checklist from Inventory</button>
    </div>`;

  const locMap=labMap(getLocs());
  const locMap2=labMap(getLocs());

  // ── COLLAPSED FILTER PANEL (mirrors My Kit) ──
  const hasActiveFilter=checklistPersonFilter!=='all'||checklistLocFilter!=='all'||checklistHidePacked;
  const activeFilterSummary=hasActiveFilter?[
    checklistPersonFilter!=='all'?(S.people.find(p=>p.id===checklistPersonFilter)?.name||''):'',
    checklistLocFilter!=='all'?(getStorageLocs().find(l=>l.id===checklistLocFilter)?.label||''):'',
    checklistHidePacked?'Unpacked only':''
  ].filter(Boolean).join(' · '):'';

  const filterPanel=`
    <div style="display:flex;gap:7px;margin-bottom:10px;align-items:center">
      <button class="btn btn-o btn-sm" onclick="toggleChecklistFilters()" style="${hasActiveFilter?'background:var(--caborder-color:var(--amber-d)':''}">
        ⚙ Filter${hasActiveFilter?` · <span style="font-family:'DM Mono',monospace;font-size:9px">${activeFilterSummary}</span>`:''}
      </button>
      ${hasActiveFilter?`<button class="btn btn-o btn-sm" style="color:var(--rust);border-color:var(--rust)" onclick="clearChecklistFilters()">✕ Clear</button>`:''}
    </div>
    <div id="clFilters" style="display:${checklistFiltersOpen?'block':'none'};padding:10px;background:var(--canvas-3);border-radius:3px;margin-bottom:12px">
      ${(S.people&&S.people.length)?`
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);text-transform:uppercase;letter-spacing:.1em">Person:</span>
        <button class="fb ${checklistPersonFilter==='all'?'on':''}" onclick="setChecklistPersonFilter('all')">All</button>
        ${S.people.map(p=>`<button class="fb" style="${checklistPersonFilter===p.id?`background:${p.color}22;color:${p.color};border-color:${p.color}66`:''}" onclick="setChecklistPersonFilter('${p.id}')">${p.emoji||'👤'} ${p.name}</button>`).join('')}
      </div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);text-transform:uppercase;letter-spacing:.1em">Location:</span>
        <button class="fb ${checklistLocFilter==='all'?'on':''}" onclick="setChecklistLocFilter('all')">All</button>
        ${getStorageLocs().map(l=>`<button class="fb" style="${checklistLocFilter===l.id?'background:var(--canvas-3);color:var(--amber);border-color:var(--amber-d)':''}" onclick="setChecklistLocFilter('${l.id}')">${l.label}</button>`).join('')}
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);text-transform:uppercase;letter-spacing:.1em">Sort:</span>
        ${[['location','Location'],['category','Category'],['type','Type'],['name','Name'],['restock','Restocking first']].map(([v,l])=>`<button class="fb ${checklistSort===v?'on':''}" onclick="setChecklistSort('${v}')">${l}</button>`).join('')}
        <button class="fb${checklistHidePacked?' on':''}" onclick="toggleHidePacked()" style="${checklistHidePacked?'background:rgba(107,140,90,.15);color:var(--sage);border-color:rgba(107,140,90,.3)':''}">
          ${checklistHidePacked?'👁 Show packed':'👁 Hide packed'}
        </button>
      </div>
    </div>`;

  const peoplePills=''; const locPills='';

  // ── BUILD FILTERED ITEM LIST ──
  const filteredCIs=[];
  cl.forEach(ci=>{
    const item=S.items.find(i=>i.id===ci.itemId);
    if(!item||item.parentId) return; // sub-items render under parent
    if(checklistHidePacked && ci.state==='packed') return;
    if(checklistPersonFilter!=='all'){
      const itemMatches=(item.personIds||[]).includes(checklistPersonFilter);
      const subMatches=subItems(item.id).some(s=>{
        const ownIds=s.personIds&&s.personIds.length?s.personIds:null;
        return ownIds?ownIds.includes(checklistPersonFilter):(item.personIds||[]).includes(checklistPersonFilter);
      });
      if(!itemMatches&&!subMatches) return;
    }
    if(checklistLocFilter!=='all'&&item.location!==checklistLocFilter) return;
    filteredCIs.push({ci,item});
  });

  // ── SORT ──
  if(checklistSort==='category'){
    filteredCIs.sort((a,b)=>getCats().findIndex(c=>c.id===a.item.category)-getCats().findIndex(c=>c.id===b.item.category)||a.item.name.localeCompare(b.item.name));
  } else if(checklistSort==='type'){
    const typeOrder=['always','house','consumable','seasonal'];
    filteredCIs.sort((a,b)=>typeOrder.indexOf(a.item.type)-typeOrder.indexOf(b.item.type)||a.item.name.localeCompare(b.item.name));
  } else if(checklistSort==='restock'){
    filteredCIs.sort((a,b)=>((b.item.restock||b.item.qty===0)?1:0)-((a.item.restock||a.item.qty===0)?1:0)||a.item.name.localeCompare(b.item.name));
  } else if(checklistSort==='name'){
    filteredCIs.sort((a,b)=>a.item.name.localeCompare(b.item.name));
  } else {
    // default: by location
    filteredCIs.sort((a,b)=>getStorageLocs().findIndex(l=>l.id===a.item.location)-getStorageLocs().findIndex(l=>l.id===b.item.location)||a.item.name.localeCompare(b.item.name));
  }

  // ── GROUP by sort key ──
  // Build ordered group keys and label map based on sort mode
  let groupKey, groupOrder, groupLabel, groupIcon;
  if(checklistSort==='location'){
    groupKey=item=>item.location;
    groupOrder=getStorageLocs().map(l=>l.id);
    groupLabel=id=>{ const l=getStorageLocs().find(x=>x.id===id); return l?l.label:id; };
    groupIcon=()=>'📍 ';
  } else if(checklistSort==='category'){
    groupKey=item=>item.category;
    groupOrder=getCats().map(c=>c.id);
    groupLabel=id=>{ const c=getCats().find(x=>x.id===id); return c?(c.emoji?c.emoji+' ':'')+c.label:id; };
    groupIcon=()=>'';
  } else if(checklistSort==='type'){
    groupKey=item=>item.type;
    groupOrder=['always','house','consumable','seasonal'];
    groupLabel=id=>({always:'Always in kit',house:'Bring from home',consumable:'Needs restocking',seasonal:'Seasonal'}[id]||id);
    groupIcon=()=>'';
  } else {
    groupKey=null; // no grouping for name / restock
  }

  const groups={};
  if(groupKey){
    filteredCIs.forEach(({ci,item})=>{
      const k=groupKey(item);
      if(!groups[k]) groups[k]=[];
      groups[k].push({ci,item});
    });
  }

  const hlCount=Object.keys(hl).length;
  const pbarReadyW=pctR-pctP;
  const pbarPackedW=pctP;

  const sortBar=`
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);text-transform:uppercase;letter-spacing:.1em;align-self:center">Sort:</span>
      ${[['location','Location'],['category','Category'],['type','Type'],['name','Name'],['restock','Restock first']].map(([v,l])=>
        `<button class="fb ${checklistSort===v?'on':''}" onclick="setChecklistSort('${v}')">${l}</button>`
      ).join('')}
      <button class="fb${checklistHidePacked?' on':''}" onclick="toggleHidePacked()" style="${checklistHidePacked?'background:rgba(107,140,90,.15);color:var(--sage);border-color:rgba(107,140,90,.3)':''}">
        ${checklistHidePacked?'👁 Show packed':'👁 Hide packed'}
      </button>
    </div>`;

  const itemsHtml=groupKey
    ? (groupOrder||[]).filter(k=>groups[k]?.length).map(k=>{
        const groupId='clgrp-'+checklistSort+'-'+k;
        const open=!collapsedLocs.has(groupId);
        const packedCount=groups[k].filter(x=>x.ci.state==='packed').length;
        // Count includes sub-items for accurate total
        const subTotal=groups[k].reduce((s,{item})=>s+subItems(item.id).filter(si=>!isExcluded(si,trip)).length,0);
        const totalCount=groups[k].length+subTotal;
        return `<div class="cloc-group">
          <div class="cloc-hdr" onclick="toggleLocGroup('${groupId}')">
            <span class="cg-toggle ${open?'open':'closed'}" style="font-size:9px">▼</span>
            <span class="cloc-title">${groupIcon(k)}${groupLabel(k)}</span>
            <span class="cg-count">${packedCount}/${totalCount}</span>
          </div>
          <div id="clg-${groupId}" style="display:${open?'block':'none'}">
            ${groups[k].map(({ci,item})=>ciRow(ci,item,trip,hl)).join('')}
          </div>
        </div>`;
      }).join('')
    : filteredCIs.map(({ci,item})=>ciRow(ci,item,trip,hl)).join('');

  return `${filterPanel}
    <div class="cprog">
      <div class="cprog-top">
        <div class="cprog-label">${ready} ready · ${packed} packed · ${total-(ready+packed)} remaining</div>
        <div class="cprog-pcts">
          <span class="cprog-pct pct-ready">${pctR}% ready</span>
          <span class="cprog-pct pct-packed">${pctP}% packed</span>
        </div>
      </div>
      <div class="pbar-wrap">
        <div class="pbar-packed" style="width:${pbarPackedW}%"></div>
        <div class="pbar-ready" style="width:${pbarReadyW}%"></div>
      </div>
      <div class="cprog-hint">Tap once = ✓ Ready · Tap again = ✓ Packed · Tap again = uncheck</div>
      ${hlCount?`<div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--amber);letter-spacing:.05em;margin-top:4px">▲ ${hlCount} items highlighted for this trip</div>`:''}
    </div>
    ${itemsHtml}
    <div style="display:flex;gap:7px;margin-top:12px;flex-wrap:wrap">
      <button class="btn btn-o btn-sm" onclick="regenChecklist('${trip.id}')">↺ Rebuild list</button>
      <button class="btn btn-o btn-sm" onclick="uncheckAll('${trip.id}')">Uncheck all</button>
      <button class="btn btn-p btn-sm" onclick="openQuickAddModal('${trip.id}')">+ Quick add item</button>
      <button class="btn btn-o btn-sm" onclick="printChecklist('${trip.id}','packing')">🖨 Print</button>
    </div>`;
}

function ciRow(ci,item,trip,hl){
  const isHL=!!hl[item.id];
  const qty=adjQty(item,trip);
  const locMap=labMap(getLocs());
  const cl=trip.checklist||[];

  // Container items: show as group header, no state toggle — progress from children
  if(item.isContainer){
    const allSubs=subItems(item.id).filter(s=>!isExcluded(s,trip));
    let visibleSubs=checklistPersonFilter==='all'?allSubs:allSubs.filter(s=>{
      const ownIds=s.personIds&&s.personIds.length?s.personIds:null;
      return ownIds?ownIds.includes(checklistPersonFilter):(item.personIds||[]).includes(checklistPersonFilter);
    });
    // Hide packed sub-items when toggle is on
    if(checklistHidePacked) visibleSubs=visibleSubs.filter(s=>{
      const sci=cl.find(c=>c.itemId===s.id);
      return !sci||sci.state!=='packed';
    });
    if(!visibleSubs.length) return ''; // hide container entirely if all children hidden
    const subCIs=visibleSubs.map(s=>cl.find(c=>c.itemId===s.id)).filter(Boolean);
    const subPacked=subCIs.filter(c=>c.state==='packed').length;
    const subReady=subCIs.filter(c=>c.state==='ready').length;
    return `
      <div style="margin:4px 0 2px;padding:6px 8px;background:var(--canvas-3);border-left:2px solid var(--amber-d);border-radius:2px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-d)">${esc(item.name)}</span>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m)">${subPacked} packed · ${subReady} ready · ${visibleSubs.length} total</span>
        </div>
      </div>
      ${visibleSubs.map(sub=>{
        let sci=cl.find(c=>c.itemId===sub.id);
        if(!sci){
          sci={itemId:sub.id,state:'unchecked'};
          trip.checklist.push(sci);
        }
        return ciSubRow(sci,sub,trip,hl,locMap);
      }).join('')}`;
  }

  // Regular item
  const needsRestock=item.restock||item.qty===0;
  const packsRoute=item.packsInto&&item.packsInto!==item.location
    ?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-m)">${locMap[item.location]||item.location} → ${locMap[item.packsInto]||item.packsInto}</span>`
    :`<span class="lbadge lb-${item.location}" style="font-size:8px;padding:1px 4px">${locMap[item.location]||item.location}</span>`;

  // Visible sub-items (respects person filter)
  const allSubs=subItems(item.id).filter(s=>!isExcluded(s,trip));
  const visibleSubs=checklistPersonFilter==='all'?allSubs:allSubs.filter(s=>{
    const ownIds=s.personIds&&s.personIds.length?s.personIds:null;
    return ownIds?ownIds.includes(checklistPersonFilter):(item.personIds||[]).includes(checklistPersonFilter);
  });

  return `
    <div class="ci ${ci.state||''} ${isHL?'hl':''}" style="position:relative" onclick="cycleState('${trip.id}','${ci.itemId}')">
      <div class="ci-state ${ci.state||''}">${ci.state==='packed'||ci.state==='ready'?'✓':''}</div>
      <div class="ci-body">
        <div class="ci-name ${ci.state||''}">${esc(item.name)}${needsRestock?` <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--amber)">⚠ low stock</span>`:''}${(()=>{
          const prePending=(item.actions||[]).filter(a=>a.stage==='pre-trip');
          const tripActions=(trip.actionStates||{});
          const incomplete=prePending.filter(a=>!tripActions[item.id+'::'+a.id]);
          return (ci.state==='packed'||ci.state==='ready')&&incomplete.length
            ? ` <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--rust)">⚡ ${incomplete.length} pre-trip action${incomplete.length!==1?'s':''} incomplete</span>`
            : incomplete.length
              ? ` <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--teal)">⚡ ${incomplete.length} to do</span>`
              : '';
        })()}</div>
        <div class="ci-meta">
          ${qty>1?`<span class="ci-qty">×${qty}</span>`:''}
          ${packsRoute}
          ${(S.people||[]).filter(p=>(item.personIds||[]).includes(p.id)).map(p=>`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;background:${p.color}22;color:${p.color};border:1px solid ${p.color}55">${p.name}</span>`).join('')}
          ${isHL?`<span class="hl-tag">▲ ${(hl[item.id]||[]).join(', ')}</span>`:''}
          ${item.notes?`<span class="ci-note">${esc(item.notes)}</span>`:''}
        </div>
      </div>
      <div style="position:relative;flex-shrink:0" onclick="event.stopPropagation()">
        <button class="btn-ic" style="padding:2px 6px;font-size:13px;border:1px solid var(--border);border-radius:2px" onclick="toggleCIMenu('ci-menu-${ci.itemId}',event)">•••</button>
        <div id="ci-menu-${ci.itemId}" style="display:none;position:absolute;right:0;top:100%;margin-top:2px;background:var(--canvas-3);border:1px solid var(--border-l);border-radius:3px;z-index:50;min-width:130px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.4)">
          <button onclick="closeCIMenu('ci-menu-${ci.itemId}');removeFromChecklist('${trip.id}','${ci.itemId}')" style="display:block;width:100%;padding:8px 14px;background:transparent;border:none;color:var(--rust);font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-align:left;cursor:pointer;text-transform:uppercase">✕ Remove from trip</button>
        </div>
      </div>
    </div>
    ${visibleSubs.length?`<div style="padding:2px 5px 0 32px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-m);letter-spacing:.08em;text-transform:uppercase">includes:</div>`:''}
    ${visibleSubs.map(sub=>{
      let sci=cl.find(c=>c.itemId===sub.id);
      if(!sci){
        sci={itemId:sub.id,state:'unchecked'};
        trip.checklist.push(sci);
      }
      return ciSubRow(sci,sub,trip,hl,locMap);
    }).join('')}
    ${inlineActions(item,trip,['pre-trip','during'])}`;
}

function ciSubRow(sci,sub,trip,hl,locMap){
  const isSubHL=!!hl[sub.id];
  const needsRestock=sub.restock||sub.qty===0;
  const packsRoute=sub.packsInto&&sub.packsInto!==sub.location
    ?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-m)">${locMap[sub.location]||sub.location} → ${locMap[sub.packsInto]||sub.packsInto}</span>`
    :`<span class="lbadge lb-${sub.location}" style="font-size:8px;padding:1px 4px">${locMap[sub.location]||sub.location}</span>`;
  return `<div class="ci sub-ci ${sci.state||''} ${isSubHL?'hl':''}" onclick="cycleState('${trip.id}','${sci.itemId}')">
    <div class="ci-state ${sci.state||''}">${sci.state==='packed'||sci.state==='ready'?'✓':''}</div>
    <div class="ci-body">
      <div class="ci-name ${sci.state||''}">${esc(sub.name)}${needsRestock?` <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--amber)">⚠ low stock</span>`:''}</div>
      <div class="ci-meta">
        ${packsRoute}
        ${(S.people||[]).filter(p=>(sub.personIds||[]).includes(p.id)).map(p=>`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;background:${p.color}22;color:${p.color};border:1px solid ${p.color}55">${p.name}</span>`).join('')}
        ${isSubHL?`<span class="hl-tag">▲ ${(hl[sub.id]||[]).join(', ')}</span>`:''}
        ${sub.notes?`<span class="ci-note">${esc(sub.notes)}</span>`:''}
      </div>
    </div>
  </div>
  ${inlineActions(sub,trip,['pre-trip','during'])}`;
}

function packAwayBody(trip){
  // Car to storage — items shown at their pack-into location (where they are in car)
  // grouped by pack-into (current) location, shown with route back to storage
  const cl=trip.checklist||[];
  if(!cl.length) return `<div class="empty">No checklist generated yet.</div>`;

  const locMap=labMap(getLocs());
  const paStates=trip.packAwayStates||{};

  // Build groups by pack-into (current) location
  let displayItems=[];
  cl.forEach(ci=>{
    const item=S.items.find(i=>i.id===ci.itemId);
    if(!item||item.parentId||item.type==='wishlist') return;
    if(checklistHidePacked&&paStates[item.id]==='packed') return;
    displayItems.push({item});
  });

  // Group by current location (packsInto || location)
  const groups={};
  const groupOrder=getLocs().map(l=>l.id);
  displayItems.forEach(({item})=>{
    const k=item.packsInto||item.location;
    if(!groups[k]) groups[k]=[];
    groups[k].push(item);
  });

  const allTop=cl.map(c=>S.items.find(i=>i.id===c.itemId)).filter(i=>i&&!i.parentId&&i.type!=='wishlist');
  const doneCount=allTop.filter(i=>paStates[i.id]==='packed').length;
  const total=allTop.length;
  const pct=total?Math.round(doneCount/total*100):0;

  const itemsHtml=groupOrder.filter(k=>groups[k]?.length).map(k=>{
    const gid='pa2-grp-'+k;
    const open=!collapsedLocs.has(gid);
    const locLabel=locMap[k]||k;
    const doneInGroup=groups[k].filter(i=>paStates[i.id]==='packed').length;
    return `<div class="cloc-group">
      <div class="cloc-hdr" onclick="toggleLocGroup('${gid}')">
        <span class="cg-toggle ${open?'open':'closed'}" style="font-size:9px">▼</span>
        <span class="cloc-title">📦 ${locLabel}</span>
        <span class="cg-count">${doneInGroup}/${groups[k].length}</span>
      </div>
      <div id="clg-${gid}" style="display:${open?'block':'none'}">
        ${groups[k].map(item=>{
          const done=paStates[item.id]==='packed';
          const dest=item.location;
          const route=item.packsInto&&item.packsInto!==item.location
            ?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-m)">${locMap[item.packsInto]||item.packsInto} → ${locMap[dest]||dest}</span>`
            :`<span class="lbadge lb-${dest}" style="font-size:8px;padding:1px 4px">→ ${locMap[dest]||dest}</span>`;
          const subs=subItems(item.id).filter(s=>s.type!=='wishlist');
          const subDone=subs.filter(s=>paStates[s.id]==='packed').length;
          return `<div class="ci ${done?'checked':''}" style="${done?'opacity:.4':''}" onclick="cyclePackAwayState('${trip.id}','${item.id}')">
            <div class="ci-state ${done?'packed':''}">${done?'✓':''}</div>
            <div class="ci-body">
              <div class="ci-name ${done?'checked-text':''}">${esc(item.name)}</div>
              <div class="ci-meta">
                ${route}
                ${subs.length?`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m)">${subDone}/${subs.length} sub-items</span>`:''}
              </div>
            </div>
          </div>
          ${subs.map(sub=>{
            const subDoneFlag=paStates[sub.id]==='packed';
            const subDest=sub.location;
            const subRoute=sub.packsInto&&sub.packsInto!==sub.location
              ?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-m)">${locMap[sub.packsInto]||sub.packsInto} → ${locMap[subDest]||subDest}</span>`
              :`<span class="lbadge lb-${subDest}" style="font-size:8px;padding:1px 4px">→ ${locMap[subDest]||subDest}</span>`;
            return `<div class="ci sub-ci ${subDoneFlag?'checked':''}" style="${subDoneFlag?'opacity:.4':''}" onclick="cyclePackAwayState('${trip.id}','${sub.id}')">
              <div class="ci-state ${subDoneFlag?'packed':''}">${subDoneFlag?'✓':''}</div>
              <div class="ci-body">
                <div class="ci-name ${subDoneFlag?'checked-text':''}">${esc(sub.name)}</div>
                <div class="ci-meta">${subRoute}</div>
              </div>
            </div>`;
          }).join('')}
          ${inlineActions(item,trip,['post-trip'])}`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  return `
    <div style="background:var(--canvas-3);border:1px solid var(--border);border-radius:2px;padding:10px 14px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px">
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-d)">${doneCount} of ${total} stored away</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--sage)">${pct}%</span>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:var(--sage);transition:width .3s"></div>
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);margin-top:5px;letter-spacing:.05em">
        Items grouped by where they are now → tap to confirm stored away
      </div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">
      <button class="fb${checklistHidePacked?' on':''}" onclick="toggleHidePacked()" style="${checklistHidePacked?'background:rgba(107,140,90,.15);color:var(--sage);border-color:rgba(107,140,90,.3)':''}">
        ${checklistHidePacked?'👁 Show stored':'👁 Hide stored'}
      </button>
    </div>
    ${itemsHtml}
    <div style="display:flex;gap:7px;margin-top:14px;flex-wrap:wrap">
      <button class="btn btn-g" onclick="packAwayAll('${trip.id}')">✓ Store Everything</button>
      <button class="btn btn-o btn-sm" onclick="unpackAwayAll('${trip.id}')">Reset all</button>
      <button class="btn btn-o btn-sm" onclick="printChecklist('${trip.id}','packaway')">🖨 Print</button>
    </div>`;
}

function cyclePackAwayState(tripId, itemId){

  if(!trip) return;
  if(!trip.packAwayStates) trip.packAwayStates={};
  const cur=trip.packAwayStates[itemId]||'unchecked';
  trip.packAwayStates[itemId]=cur==='unchecked'?'packed':'unchecked';
  save(); renderTrips();
}

function packAwayAll(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  if(!trip.packAwayStates) trip.packAwayStates={};
  (trip.checklist||[]).forEach(ci=>{
    const item=S.items.find(i=>i.id===ci.itemId);
    if(item&&item.type!=='wishlist') trip.packAwayStates[item.id]='packed';
  });
  save(); renderTrips();
}

function unpackAwayAll(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  trip.packAwayStates={};
  save(); renderTrips();
}

// TRIP ACTIONS
// ══════════════════════════════════════════════════
function genChecklist(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  // Only include top-level items — sub-items are rendered via their parent in ciRow
  // and tracked as separate checklist entries for independent state
  const included=S.items.filter(i=>i.type!=='wishlist'&&!isExcluded(i,trip));
  // Preserve state for any items already in checklist (don't reset existing progress)
  const existing={};
  (trip.checklist||[]).forEach(c=>existing[c.itemId]=c.state);
  trip.checklist=included.map(item=>({
    itemId:item.id,
    state:existing[item.id]||'unchecked'
  }));
  save(); renderTrips();
}

function hardRegenChecklist(tripId){
  // Full reset — used by the Regenerate button
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  const included=S.items.filter(i=>i.type!=='wishlist'&&!isExcluded(i,trip));
  trip.checklist=included.map(item=>({ itemId:item.id, state:'unchecked' }));
  save(); renderTrips();
}

function regenChecklist(tripId){
  if(!confirm('Regenerate checklist? Current ready/packed state will be reset.')) return;
  hardRegenChecklist(tripId);
}

function cycleState(tripId, itemId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip?.checklist) return;
  const ci=trip.checklist.find(c=>c.itemId===itemId);
  if(!ci) return;
  const currentState=ci.state||'unchecked';
  // Hard block: moving from unchecked→ready requires all pre-trip actions complete
  if(currentState==='unchecked'){
    const item=S.items.find(i=>i.id===itemId);
    if(item){
      const prePending=(item.actions||[]).filter(a=>a.stage==='pre-trip');
      const tripActions=trip.actionStates||{};
      const incomplete=prePending.filter(a=>!tripActions[item.id+'::'+a.id]);
      if(incomplete.length){
        showToast('⚡ Complete pre-trip action'+(incomplete.length>1?'s':'')+' first: '+incomplete.map(a=>a.label).join(', '));
        return;
      }
    }
  }
  const cycle={ unchecked:'ready', ready:'packed', packed:'unchecked' };
  ci.state=cycle[currentState]||'ready';
  save(); renderTrips();
}

function uncheckAll(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip?.checklist) return;
  trip.checklist.forEach(c=>c.state='unchecked');
  save(); renderTrips();
}

function toggleLocGroup(loc){
  if(collapsedLocs.has(loc)) collapsedLocs.delete(loc);
  else collapsedLocs.add(loc);
  renderTrips();
}

function startPacking(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  trip.status='packing';
  activeTripTab='checklist';
  if(!trip.checklist||!trip.checklist.length){ genChecklist(tripId); return; }
  save(); renderTrips();
}

function completeTrip(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  trip.status='complete'; save(); renderTrips();
}

function startPostTrip(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  trip.status='post-trip'; activeTripTab='post-trip'; save(); renderTrips();
}

function finishPostTrip(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  trip.status='complete'; activeTripTab='checklist'; save(); renderAll();
}

function saveTripNotes(tripId,val){
  const trip=S.trips.find(t=>t.id===tripId);
  if(trip){ trip.notes=val; save(); }
}

function setRestock(itemId,val){
  const item=S.items.find(i=>i.id===itemId);
  if(item){ item.restock=val; save(); renderStats(); }
}

function ptAdj(id,delta){
  const item=S.items.find(i=>i.id===id);
  if(!item) return;
  item.qty=Math.max(0,(item.qty||0)+delta);
  if(item.qty===0) item.restock=true;
  save();
  const el=document.getElementById('ptq-'+id);
  if(el) el.textContent=item.qty;
  renderStats();
}

function openTrip(id){ activeTripId=id; activeTripTab='checklist'; checklistLocFilter='all'; checklistPersonFilter='all'; checklistSort='location'; checklistHidePacked=false; checklistFiltersOpen=false; renderTrips(); }
function closeTrip(){ activeTripId=null; renderTrips(); }
function setTripTab(tab){ activeTripTab=tab; renderTrips(); }

function delTrip(id){
  if(!confirm('Delete this trip?')) return;
  S.trips=S.trips.filter(t=>t.id!==id);
  activeTripId=null; save(); renderTrips();
}
