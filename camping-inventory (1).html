// PACK AWAY BODY
// ══════════════════════════════════════════════════
function packUpBody(trip){
  const cl=trip.checklist||[];
  if(!cl.length) return `<div class="empty">No checklist generated yet.<br>
    <button class="btn btn-p" style="margin-top:10px" onclick="genChecklist('${trip.id}')">Generate Checklist</button></div>`;

  const locMap=labMap(getLocs());
  const paStates=trip.packUpStates||{};

  // Build item list — top-level items on checklist
  // Grouped by "currently at" location = packsInto if set, else storage location
  const byLoc={};
  cl.forEach(ci=>{
    const item=S.items.find(i=>i.id===ci.itemId);
    if(!item||item.parentId||item.type==='wishlist') return;
    const currentLoc=item.packsInto||item.location;
    if(!byLoc[currentLoc]) byLoc[currentLoc]=[];
    byLoc[currentLoc].push({ci,item});
  });

  // progress
  const allItems=cl.map(c=>S.items.find(i=>i.id===c.itemId)).filter(i=>i&&!i.parentId&&i.type!=='wishlist');
  const doneCount=allItems.filter(i=>paStates[i.id]==='packed').length;
  const total=allItems.length;
  const pct=total?Math.round(doneCount/total*100):0;

  // Sort controls reuse checklistSort state
  const sortBar=`
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);text-transform:uppercase;letter-spacing:.1em;align-self:center">Group:</span>
      ${[['location','By location'],['category','By category'],['type','By type'],['name','By name']].map(([v,l])=>
        `<button class="fb ${checklistSort===v?'on':''}" onclick="setChecklistSort('${v}')">${l}</button>`
      ).join('')}
      <button class="fb${checklistHidePacked?' on':''}" onclick="toggleHidePacked()" style="${checklistHidePacked?'background:rgba(107,140,90,.15);color:var(--sage);border-color:rgba(107,140,90,.3)':''}">
        ${checklistHidePacked?'👁 Show packed':'👁 Hide packed'}
      </button>
    </div>`;

  // Build sorted/grouped list
  let groupKey,groupOrder,groupLabel,groupIcon;
  if(checklistSort==='category'){
    groupKey=item=>item.category;
    groupOrder=getCats().map(c=>c.id);
    groupLabel=id=>{ const c=getCats().find(x=>x.id===id); return c?(c.emoji?c.emoji+' ':'')+c.label:id; };
    groupIcon=()=>'';
  } else if(checklistSort==='type'){
    groupKey=item=>item.type;
    groupOrder=['always','house','consumable','seasonal'];
    groupLabel=id=>({always:'Always in kit',house:'Bring from home',consumable:'Needs restocking',seasonal:'Seasonal'}[id]||id);
    groupIcon=()=>'';
  } else if(checklistSort==='name'){
    groupKey=null;
  } else {
    // default: by current location (packsInto || location)
    groupKey=item=>item.packsInto||item.location;
    groupOrder=getAllLocs().map(l=>l.id);
    groupLabel=id=>{ const l=getLocs().find(x=>x.id===id); return l?l.label:id; };
    groupIcon=()=>'📍 ';
  }

  // Collect items for display
  let displayItems=[];
  cl.forEach(ci=>{
    const item=S.items.find(i=>i.id===ci.itemId);
    if(!item||item.parentId||item.type==='wishlist') return;
    if(checklistHidePacked&&paStates[item.id]==='packed') return;
    displayItems.push({ci,item});
  });

  if(checklistSort==='name') displayItems.sort((a,b)=>a.item.name.localeCompare(b.item.name));

  const groups={};
  if(groupKey){
    displayItems.forEach(({ci,item})=>{
      const k=groupKey(item);
      if(!groups[k]) groups[k]=[];
      groups[k].push({ci,item});
    });
  }

  const itemsHtml=groupKey
    ?(groupOrder||[]).filter(k=>groups[k]?.length).map(k=>{
        const gid='pa-grp-'+k;
        const open=!collapsedLocs.has(gid);
        const doneInGroup=groups[k].filter(({item})=>paStates[item.id]==='packed').length;
        return `<div class="cloc-group">
          <div class="cloc-hdr" onclick="toggleLocGroup('${gid}')">
            <span class="cg-toggle ${open?'open':'closed'}" style="font-size:9px">▼</span>
            <span class="cloc-title">${groupIcon(k)}${groupLabel(k)}</span>
            <span class="cg-count">${doneInGroup}/${groups[k].length}</span>
          </div>
          <div id="clg-${gid}" style="display:${open?'block':'none'}">
            ${groups[k].map(({ci,item})=>packUpRow(item,trip,locMap)).join('')}
          </div>
        </div>`;
      }).join('')
    :displayItems.map(({ci,item})=>packUpRow(item,trip,locMap)).join('');

  return `
    <div style="background:var(--canvas-3);border:1px solid var(--border);border-radius:2px;padding:10px 14px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px">
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-d)">${doneCount} of ${total} packed away</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--sage)">${pct}%</span>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:var(--sage);transition:width .3s"></div>
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);margin-top:5px;letter-spacing:.05em">
        Items are shown at their current packed location → tap to confirm packed away to storage
      </div>
    </div>
    ${sortBar}
    ${itemsHtml}
    <div style="display:flex;gap:7px;margin-top:14px;flex-wrap:wrap">
      <button class="btn btn-g" onclick="packUpAll('${trip.id}')">✓ Pack up everything</button>
      <button class="btn btn-o btn-sm" onclick="unpackAll('${trip.id}')">Unpack all</button>
      <button class="btn btn-o btn-sm" onclick="printChecklist('${trip.id}','packup')">🖨 Print</button>
    </div>`;
}

function packUpAll(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  if(!trip.packUpStates) trip.packUpStates={};
  (trip.checklist||[]).forEach(ci=>{
    const item=S.items.find(i=>i.id===ci.itemId);
    if(item&&item.type!=='wishlist') trip.packUpStates[item.id]='packed';
  });
  save(); renderTrips();
}

function unpackAll(tripId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  trip.packUpStates={};
  save(); renderTrips();
}

function packUpRow(item, trip, locMap){
  const paStates=trip.packUpStates||{};
  const state=paStates[item.id]||'unchecked';
  const done=state==='packed';
  const currentLoc=item.packsInto||item.location;
  const route=item.packsInto&&item.packsInto!==item.location
    ?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-m)">${locMap[currentLoc]||currentLoc} → ${locMap[item.location]||item.location}</span>`
    :`<span class="lbadge lb-${item.location}" style="font-size:8px;padding:1px 4px">${locMap[item.location]||item.location}</span>`;

  // sub-items
  const subs=subItems(item.id).filter(s=>s.type!=='wishlist');
  const subsDoneCount=subs.filter(s=>(paStates[s.id]||'unchecked')==='packed').length;

  return `
    <div class="ci ${done?'checked':''}" style="position:relative;${done?'opacity:.4':''}" onclick="cyclePackUpState('${trip.id}','${item.id}')">
      <div class="ci-state ${done?'packed':''}">${done?'✓':''}</div>
      <div class="ci-body">
        <div class="ci-name ${done?'checked-text':''}">${esc(item.name)}</div>
        <div class="ci-meta">
          ${route}
          ${subs.length?`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m)">${subsDoneCount}/${subs.length} sub-items</span>`:''}
        </div>
      </div>
    </div>
    ${subs.map(sub=>{
      const subDone=(paStates[sub.id]||'unchecked')==='packed';
      const subRoute=sub.packsInto&&sub.packsInto!==sub.location
        ?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-m)">${locMap[sub.packsInto]||sub.packsInto} → ${locMap[sub.location]||sub.location}</span>`
        :`<span class="lbadge lb-${sub.location}" style="font-size:8px;padding:1px 4px">${locMap[sub.location]||sub.location}</span>`;
      return `<div class="ci sub-ci ${subDone?'checked':''}" style="${subDone?'opacity:.4':''}" onclick="cyclePackUpState('${trip.id}','${sub.id}')">
        <div class="ci-state ${subDone?'packed':''}">${subDone?'✓':''}</div>
        <div class="ci-body">
          <div class="ci-name ${subDone?'checked-text':''}">${esc(sub.name)}</div>
          <div class="ci-meta">${subRoute}</div>
        </div>
      </div>
      ${inlineActions(sub,trip,['before-pack-away'])}`;
    }).join('')}
    ${inlineActions(item,trip,['before-pack-away'])}`;
}

function cyclePackUpState(tripId, itemId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  if(!trip.packUpStates) trip.packUpStates={};
  const cur=trip.packUpStates[itemId]||'unchecked';
  trip.packUpStates[itemId]=cur==='unchecked'?'packed':'unchecked';
  save(); renderTrips();
}

function qAdj(id,delta){
  const item=S.items.find(i=>i.id===id);
  if(!item) return;
  item.qty=Math.max(0,(item.qty||0)+delta);
  if(item.qty===0) item.restock=true;
  save(); renderAll();
}

function clearRestock(id){
  const item=S.items.find(i=>i.id===id);
  if(!item) return;
  item.restock=false; item.qty=Math.max(item.qty,1);
  save(); renderAll();
}

function delItem(id){

  S.items=S.items.filter(i=>i.id!==id&&i.parentId!==id);
  save(); renderAll();
}

function promoteWish(id){

}

function populateDynamicDropdowns(selectedCat, selectedLoc, selectedActivity){
  // Category select
  const catSel=document.getElementById('iCat');
  if(catSel){
    catSel.innerHTML=getCats().map(c=>`<option value="${c.id}"${c.id===selectedCat?' selected':''}>${c.emoji||''} ${c.label}</option>`).join('');
  }
  // Location select — storage locations only
  const locSel=document.getElementById('iLoc');
  if(locSel){
    locSel.innerHTML=getStorageLocs().map(l=>`<option value="${l.id}"${l.id===selectedLoc?' selected':''}>${l.label}</option>`).join('');
  }
  // Activity select
  const actSel=document.getElementById('iActivity');
  if(actSel){
    actSel.innerHTML=`<option value="">None</option>`+getActs().map(a=>`<option value="${a.id}"${a.id===selectedActivity?' selected':''}>${a.emoji||''} ${a.label}</option>`).join('');
  }
  // Packs into select — pack-into locations only
  const pitSel=document.getElementById('iPacksInto');
  if(pitSel){
    const curPit=pitSel.value;
    pitSel.innerHTML=`<option value="">— Same as storage location —</option>`+getPackIntoLocs().map(l=>`<option value="${l.id}"${l.id===curPit?' selected':''}>${l.label}</option>`).join('');
  }
  // Inventory location filter — storage locations only
  const locF=document.getElementById('locF');
  if(locF){
    const cur=locF.value;
    locF.innerHTML=`<option value="all">All Locations</option>`+getStorageLocs().map(l=>`<option value="${l.id}"${l.id===cur?' selected':''}>${l.label}</option>`).join('');
  }
}

// ITEM ACTIONS
// ══════════════════════════════════════════════════
const STAGE_LABELS={
  'pre-trip':        { label:'Before you go',         color:'var(--blue)',  icon:'🔧' },
  'during':          { label:'While camping',       color:'var(--amber)', icon:'⛺' },
  'before-pack-away':{ label:'Before loading up',  color:'var(--purple)',icon:'📦' },
  'post-trip':       { label:'When you\'re home',         color:'var(--teal)',  icon:'🏠' }
};

function inlineActions(item, trip, stages){
  const tripActions=trip.actionStates||{};
  const actions=(item.actions||[]).filter(a=>stages.includes(a.stage));
  if(!actions.length) return '';
  return `<div style="padding:3px 6px 3px 32px;background:var(--canvas-3);border-left:2px solid var(--border-l)">
    ${actions.map(a=>{
      const key=item.id+'::'+a.id;
      const done=!!tripActions[key];
      const sl=STAGE_LABELS[a.stage];
      return `<div style="display:flex;align-items:center;gap:7px;padding:4px 0;cursor:pointer;border-bottom:1px solid var(--border);${done?'opacity:.45':''}" onclick="event.stopPropagation();toggleTripAction('${trip.id}','${item.id}','${a.id}')">
        <div style="width:14px;height:14px;border-radius:2px;border:1px solid ${done?'var(--sage)':'var(--border)'};background:${done?'rgba(107,140,90,.25)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--sage);flex-shrink:0">${done?'✓':''}</div>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:${sl?.color||'var(--text-m)'};text-transform:uppercase;letter-spacing:.06em;min-width:60px">${sl?.icon||''} ${sl?.label||a.stage}</span>
        <span style="font-size:11px;${done?'text-decoration:line-through':''}">${esc(a.label)}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function actionsBody(trip){
  // Collect all actions from checklist items
  const byStage={ 'pre-trip':[], 'during':[], 'before-pack-away':[], 'post-trip':[] };
  (trip.checklist||[]).forEach(ci=>{
    const item=S.items.find(i=>i.id===ci.itemId);
    if(!item) return;
    (item.actions||[]).forEach(a=>{
      if(byStage[a.stage]) byStage[a.stage].push({item,action:a});
    });
  });

  const hasAny=Object.values(byStage).some(arr=>arr.length>0);
  if(!hasAny) return `
    <div class="empty">No actions defined for items on this trip.<br>
    <span style="font-size:11px;display:block;margin-top:4px">Add actions to items in your inventory to see them here.</span></div>`;

  const tripActions=trip.actionStates||{};
  const stageOrder=['pre-trip','during','before-pack-away','post-trip'];

  return stageOrder.filter(s=>byStage[s].length).map(stage=>{
    const sl=STAGE_LABELS[stage];
    const items=byStage[stage];
    const doneCount=items.filter(({item,action})=>!!tripActions[item.id+'::'+action.id]).length;
    const stageGroupId='astage-'+stage;
    const open=!collapsedLocs.has(stageGroupId);
    return `<div class="cloc-group">
      <div class="cloc-hdr" onclick="toggleLocGroup('${stageGroupId}')">
        <span class="cg-toggle ${open?'open':'closed'}" style="font-size:9px">▼</span>
        <span class="cloc-title" style="color:${sl.color}">${sl.icon} ${sl.label}</span>
        <span class="cg-count">${doneCount}/${items.length}</span>
      </div>
      <div id="clg-${stageGroupId}" style="display:${open?'block':'none'}">
        ${items.map(({item,action})=>{
          const key=item.id+'::'+action.id;
          const done=!!tripActions[key];
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid rgba(58,58,46,.4);cursor:pointer;${done?'opacity:.45':''}" onclick="toggleTripAction('${trip.id}','${item.id}','${action.id}')">
            <div style="width:20px;height:20px;border-radius:3px;border:1px solid ${done?'var(--sage)':'var(--border)'};background:${done?'rgba(107,140,90,.25)':'var(--canvas-3)'};display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--sage);flex-shrink:0">${done?'✓':''}</div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500;${done?'text-decoration:line-through':''}">${esc(action.label)}</div>
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text-m);text-transform:uppercase;letter-spacing:.06em;margin-top:1px">${esc(item.name)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function flagDamaged(tripId, itemId, type){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  if(!trip.damaged) trip.damaged={};
  trip.damaged[itemId]=type;
  // If replace — auto-create wishlist entry
  if(type==='replace'){
    const item=S.items.find(i=>i.id===itemId);
    if(item){
      const exists=S.items.some(i=>i.type==='wishlist'&&i.name===item.name+' (replacement)');
      if(!exists){
        S.items.push({
          id:uid(), parentId:null, name:item.name+' (replacement)',
          type:'wishlist', category:item.category, location:item.location,
          qty:1, season:'all', activity:'', restock:false, isContainer:false,
          packsInto:null, notes:'Flagged for replacement after '+esc(trip.name),
          personIds:[], actions:[]
        });
      }
    }
  }
  save(); renderTrips(); renderStats();
}

function clearDamaged(tripId, itemId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip||!trip.damaged) return;
  delete trip.damaged[itemId];
  save(); renderTrips();
}

function flagLeftAtSite(tripId, itemId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  if(!trip.leftAtSite) trip.leftAtSite={};
  const item=S.items.find(i=>i.id===itemId);
  const note=prompt(`Note for "${item?.name||itemId}" left at site (optional):`);
  if(note===null) return; // cancelled
  trip.leftAtSite[itemId]=note||'';
  save(); renderTrips();
}

function clearLeftAtSite(tripId, itemId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip||!trip.leftAtSite) return;
  delete trip.leftAtSite[itemId];
  save(); renderTrips();
}

function toggleTripAction(tripId, itemId, actionId){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  if(!trip.actionStates) trip.actionStates={};
  const key=itemId+'::'+actionId;
  trip.actionStates[key]=!trip.actionStates[key];
  save(); renderTrips();
}

// Item modal action list management
function renderItemActionsList(){
  const el=document.getElementById('iActionsList');

  if(!actions.length){ el.innerHTML=''; return; }
  el.innerHTML=actions.map((a,i)=>`

function addItemAction(){
  const label=document.getElementById('iActionLabel').value.trim();
  if(!label) return;
  const stage=document.getElementById('iActionStage').value;
  if(!window._itemActions) window._itemActions=[];
  window._itemActions.push({id:uid(), label, stage});
  document.getElementById('iActionLabel').value='';
  renderItemActionsList();
}

function removeItemAction(idx){
  if(!window._itemActions) return;
  window._itemActions.splice(idx,1);
  renderItemActionsList();
}

            <label class="ck"><input type="checkbox" id="stgIsStorage" ${!item||item.isStorageLoc!==false?'checked':''}> Storage location (items live here)</label>

  setTimeout(()=>document.getElementById('stgLabel').focus(),50);
}

function closeSettingsModal(){
  const ov=document.getElementById('settingsModalOverlay');
  if(ov) ov.remove();
}

function saveSettingsItem(){
  const label=document.getElementById('stgLabel').value.trim();
  if(!label){ document.getElementById('stgLabel').focus(); return; }
  const hasEmoji=settingsEditKey==='categories'||settingsEditKey==='activities';
  const emoji=hasEmoji?(document.getElementById('stgEmoji')?.value.trim()||''):'';

  const isLoc=settingsEditKey==='locations';
  const locFlags=isLoc?{
    isStorageLoc:document.getElementById('stgIsStorage')?.checked!==false,
    isPackInto:!!document.getElementById('stgIsPackInto')?.checked
  }:{};

  if(settingsEditId){
    // Edit existing
    S.settings[settingsEditKey]=S.settings[settingsEditKey].map(x=>
      x.id===settingsEditId?{...x, label, ...(hasEmoji?{emoji}:{}), ...locFlags}:x
    );
  } else {
    // Add new — validate id
    const idInput=document.getElementById('stgId');
    let id=(idInput?.value.trim()||label.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''));
    if(!id){ alert('Please enter a valid ID.'); return; }
    // Ensure unique
    if(S.settings[settingsEditKey].some(x=>x.id===id)){
      id=id+'-'+Date.now().toString(36);
    }
    S.settings[settingsEditKey].push({ id, label, ...(hasEmoji?{emoji}:{}), ...locFlags });
  }
  save();
  closeSettingsModal();
  renderSettings();
  populateDynamicDropdowns(null,null,null); // refresh locF
}

function deleteSettingsItem(key, id, usageCount){
  if(usageCount>0){
    if(!confirm(`"${S.settings[key].find(x=>x.id===id)?.label}" is used by ${usageCount} item${usageCount!==1?'s':''}. Delete anyway? Those items will still reference the old value.`)) return;
  } else {
    if(!confirm('Delete this item?')) return;
  }
  S.settings[key]=S.settings[key].filter(x=>x.id!==id);
  save();
  renderSettings();
  populateDynamicDropdowns(null,null,null);
}

function exportData(){
  const json=JSON.stringify({version:3,exported:new Date().toISOString(),...S},null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`basecamp-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  // Record last export time
  localStorage.setItem('basecamp_last_export', new Date().toISOString());
}

async function shareBackup(){
  const json=JSON.stringify({version:3,exported:new Date().toISOString(),...S},null,2);
  const filename=`basecamp-${new Date().toISOString().slice(0,10)}.json`;
  const file=new File([json], filename, {type:'application/json'});
  // Try Web Share API with file (iOS 15+, works with Files, WhatsApp, Mail, etc.)
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({
        title:'Base Camp Backup',
        text:'Base Camp camping inventory backup — '+new Date().toLocaleDateString('en-GB')+'. Open with Base Camp to restore.',
        files:[file]
      });
      localStorage.setItem('basecamp_last_export', new Date().toISOString());
      closeBackupModal();
      return;
    }catch(e){
      if(e.name==='AbortError') return; // user cancelled — don't fall through
    }
  }
  // Fallback — plain download
  exportData();
  closeBackupModal();
}

function checkBackupReminder(){
  const last=localStorage.getItem('basecamp_last_export');
  if(!last){
    // Never exported — show reminder after a small delay so app loads first
    setTimeout(showBackupModal, 1200);
    return;
  }
  const daysSince=(Date.now()-new Date(last).getTime())/(1000*60*60*24);
  if(daysSince>=7) setTimeout(showBackupModal, 1200);
}

  const snooze=new Date(Date.now()-6*24*60*60*1000).toISOString();

function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // Accept any object with an items array — v1, v2, v3
      const rawItems=Array.isArray(data.items)?data.items:Array.isArray(data)?data:null;
      if(!rawItems){ alert('This file doesn\'t look like a Base Camp backup. Please choose a file you exported from Base Camp.'); return; }
      if(!confirm('Restore '+rawItems.length+' items and '+(data.trips||[]).length+' trips from this backup? This will replace all your current data.')) return;

      // Migrate items — fill in all fields with safe defaults
      const items=rawItems.map(i=>({
        id:          i.id||uid(),
        parentId:    i.parentId||null,
        name:        i.name||'Unnamed item',
        type:        i.type||'always',
        category:    i.category||'other',
        location:    i.location||'shed',
        qty:         (i.qty!=null)?Number(i.qty):1,
        season:      i.season||'all',
        activity:    i.activity||'',
        restock:     !!i.restock,
        isContainer: !!i.isContainer,
        packsInto:   i.packsInto||null,
        personIds:   i.personIds||[],
        actions:     i.actions||[],
        notes:       i.notes||''
      }));

      // Migrate trips
      const trips=(data.trips||[]).map(t=>({
        id:          t.id||uid(),
        name:        t.name||'Unnamed trip',
        status:      t.status||'planning',
        date:        t.date||'',
        nights:      t.nights||3,
        season:      t.season||'summer',
        site:        t.site||'basic',
        extraPeople: t.extraPeople||0,
        distance:    t.distance||'regional',
        dog:         t.dog!=null?t.dog:true,
        activities:  t.activities||[],
        notes:       t.notes||'',
        checklist:   (t.checklist||[]).map(c=>({
          itemId: c.itemId,
          state:  c.state||(c.checked===true?'packed':'unchecked')
        })),
        actionStates:    t.actionStates||{},
        packUpStates:    t.packUpStates||{},
        packAwayStates:  t.packAwayStates||{},
        leftAtSite:      t.leftAtSite||{},
        damaged:         t.damaged||{}
      }));

      // Migrate people
      const people=(data.people||[]).map(p=>({
        id:    p.id||uid(),
        name:  p.name||'Unknown',
        emoji: p.emoji||'👤',
        color: p.color||'#d4902a'
      }));

      // Migrate settings — keep custom lists if present, fall back to defaults
      const ds=defaultSettings();
      const settings={
        categories: (data.settings&&data.settings.categories&&data.settings.categories.length)
          ? data.settings.categories : ds.categories,
        locations:  (data.settings&&data.settings.locations&&data.settings.locations.length)
          ? data.settings.locations  : ds.locations,
        activities: (data.settings&&data.settings.activities&&data.settings.activities.length)
          ? data.settings.activities : ds.activities,
      };

      S={ items, trips, people, settings };
      save(); renderAll();
      alert('✓ Restored successfully — '+items.length+' items, '+trips.length+' trips, '+people.length+' people.');
    }catch(err){
      alert('Could not read file: '+err.message);
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

// ══════════════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════════════
function renderPeople(){
  if(!S.people) S.people=[];
  const el=document.getElementById('peopleContent');
  const EMOJIS=['👤','🧑','👩','👨','🧒','👦','👧','🐕'];
  if(!S.people.length){
    el.innerHTML=`<div class="empty" style="margin-top:0">No people added yet. Add family members to assign items and filter by person.<br>
      <button class="btn btn-p" style="margin-top:12px" onclick="openPersonModal()">+ Add Person</button></div>`;
  } else {
    el.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-d)">${S.people.length} Person${S.people.length!==1?'s':''}</span>
        <button class="btn btn-p btn-sm" onclick="openPersonModal()">+ Add Person</button>
      </div>
      ${S.people.map(p=>{
        const count=S.items.filter(i=>(i.personIds||[]).includes(p.id)).length;
        return `<div style="background:var(--canvas-2);border:1px solid var(--border);border-left:3px solid ${p.color};border-radius:3px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:22px">${p.emoji||'👤'}</span>
            <div>
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;color:${p.color}">${esc(p.name)}</div>
              <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-m);margin-top:2px">${count} item${count!==1?'s':''} assigned</div>
            </div>
          </div>
          <div style="display:flex;gap:5px">
            <button class="btn-ic" onclick="openPersonModal('${p.id}')">✎</button>
            <button class="btn-ic" style="color:var(--rust)" onclick="deletePerson('${p.id}')">✕</button>
          </div>
        </div>`;
      }).join('')}`;
  }
}

let editPersonId=null;
function openPersonModal(id){
  editPersonId=id||null;
  const person=id?S.people.find(p=>p.id===id):null;
  const EMOJIS=['👤','🧑','👩','👨','🧒','👦','👧','🐕'];
  const currentColor=person?person.color:PERSON_COLORS[(S.people.length)%PERSON_COLORS.length];
  const currentEmoji=person?person.emoji:'👤';
  const el=document.getElementById('peopleContent');
  // inject inline modal
  const modalHtml=`
    <div id="personModalOverlay" style="position:fixed;inset:0;background:rgba(10,10,8,.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)closePersonModal()">
      <div style="background:var(--canvas-2);border:1px solid var(--border-l);border-top:3px solid var(--amber);width:100%;max-width:400px;border-radius:3px;padding:20px">
        <div class="mtitle">${person?'Edit Person':'Add Person'}</div>
        <div class="fg"><label class="fl">Name *</label><input class="fi" id="pName" value="${person?esc(person.name):''}" placeholder="e.g. Derrick" autofocus></div>
        <div class="fg"><label class="fl">Emoji</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px">
            ${EMOJIS.map(em=>`<button type="button" id="pemoji-${em}" onclick="selectEmoji('${em}')" style="font-size:20px;padding:4px 8px;background:${currentEmoji===em?'var(--canvas-3)':'transparent'};border:1px solid ${currentEmoji===em?'var(--amber-d)':'var(--border)'};border-radius:4px;cursor:pointer">${em}</button>`).join('')}
          </div>
        </div>
        <div class="fg"><label class="fl">Colour</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px">
            ${PERSON_COLORS.map(c=>`<button type="button" id="pcol-${c.slice(1)}" onclick="selectPersonColor('${c}')" style="width:28px;height:28px;border-radius:50%;background:${c};border:2px solid ${currentColor===c?'#e8e4d8':'transparent'};cursor:pointer"></button>`).join('')}
          </div>
        </div>
        <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <button class="btn btn-o" onclick="closePersonModal()">Cancel</button>
          <button class="btn btn-p" onclick="savePerson()">Save</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  // store selected values
  window._personEmoji=currentEmoji;
  window._personColor=currentColor;
}

function selectEmoji(em){
  window._personEmoji=em;
  document.querySelectorAll('[id^="pemoji-"]').forEach(b=>{
    b.style.background='transparent'; b.style.borderColor='var(--border)';
  });
  const btn=document.getElementById('pemoji-'+em);
  if(btn){btn.style.background='var(--canvas-3)';btn.style.borderColor='var(--amber-d)';}
}

function selectPersonColor(c){
  window._personColor=c;
  document.querySelectorAll('[id^="pcol-"]').forEach(b=>b.style.borderColor='transparent');
  const btn=document.getElementById('pcol-'+c.slice(1));
  if(btn) btn.style.borderColor='#e8e4d8';
}

function closePersonModal(){
  const ov=document.getElementById('personModalOverlay');
  if(ov) ov.remove();
}

function savePerson(){
  const name=document.getElementById('pName').value.trim();
  if(!name) return;
  if(!S.people) S.people=[];
  if(editPersonId){
    const idx=S.people.findIndex(p=>p.id===editPersonId);
    S.people[idx]={...S.people[idx],name,emoji:window._personEmoji||'👤',color:window._personColor||'#d4902a'};
  } else {
    S.people.push({id:uid(),name,emoji:window._personEmoji||'👤',color:window._personColor||'#d4902a'});
  }
  save(); closePersonModal(); renderAll(); updatePersonFilterSelect();
}

function deletePerson(id){
  if(!confirm('Delete this person? Items assigned to them will become unassigned.')) return;
  S.people=(S.people||[]).filter(p=>p.id!==id);
  S.items=S.items.map(i=>({...i,personIds:(i.personIds||[]).filter(pid=>pid!==id)}));
  if(personFilter===id) personFilter='all';
  if(checklistPersonFilter===id) checklistPersonFilter='all';
  save(); renderAll(); updatePersonFilterSelect();
}

// ══════════════════════════════════════════════════
// PRINT
// ══════════════════════════════════════════════════
function printChecklist(tripId, mode){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip) return;
  const cl=trip.checklist||[];
  const locMap=labMap(getLocs());

  // ── Determine title and action stages ──
  const titles={packing:'Packing List',packup:'Pack Up',packaway:'Pack Away'};
  const modeDescs={packing:'Home to car',packup:'Camp to car',packaway:'Car to storage'};
  const actionStagesMap={packing:['pre-trip','during'],packup:['before-pack-away'],packaway:['post-trip']};
  const listTitle=titles[mode]||'Checklist';
  const modeDesc=modeDescs[mode]||'';
  const actionStages=actionStagesMap[mode]||[];

  // ── Use same filter/sort/group as current app state ──
  // Build filtered item list matching exactly what is on screen
  const filteredCIs=[];
  cl.forEach(ci=>{
    const item=S.items.find(i=>i.id===ci.itemId);
    if(!item||item.parentId||item.type==='wishlist') return;
    // Respect hide-packed setting
    if(checklistHidePacked && ci.state==='packed') return;
    // Respect person filter
    if(checklistPersonFilter!=='all'){
      const itemMatches=(item.personIds||[]).includes(checklistPersonFilter);
      const subMatches=subItems(item.id).some(s=>{
        const ownIds=s.personIds&&s.personIds.length?s.personIds:null;
        return ownIds?ownIds.includes(checklistPersonFilter):(item.personIds||[]).includes(checklistPersonFilter);
      });
      if(!itemMatches&&!subMatches) return;
    }
    // Respect location filter
    if(checklistLocFilter!=='all'&&item.location!==checklistLocFilter) return;
    filteredCIs.push({ci,item});
  });

  // ── Same sort as app ──
  if(checklistSort==='category'){
    filteredCIs.sort((a,b)=>getCats().findIndex(c=>c.id===a.item.category)-getCats().findIndex(c=>c.id===b.item.category)||a.item.name.localeCompare(b.item.name));
  } else if(checklistSort==='type'){
    const typeOrder=['always','house','consumable','seasonal'];
    filteredCIs.sort((a,b)=>typeOrder.indexOf(a.item.type)-typeOrder.indexOf(b.item.type)||a.item.name.localeCompare(b.item.name));
  } else if(checklistSort==='restock'){
    filteredCIs.sort((a,b)=>((b.item.restock||b.item.qty===0)?1:0)-((a.item.restock||a.item.qty===0)?1:0)||a.item.name.localeCompare(b.item.name));
  } else if(checklistSort==='name'){
    filteredCIs.sort((a,b)=>a.item.name.localeCompare(b.item.name));
  } else {
    filteredCIs.sort((a,b)=>getStorageLocs().findIndex(l=>l.id===a.item.location)-getStorageLocs().findIndex(l=>l.id===b.item.location)||a.item.name.localeCompare(b.item.name));
  }

  // ── Same grouping as app ──
  let groupKey,groupOrder,groupLabel,groupIcon;
  if(checklistSort==='location'){
    groupKey=item=>item.location;
    groupOrder=getStorageLocs().map(l=>l.id);
    groupLabel=id=>{ const l=getStorageLocs().find(x=>x.id===id); return l?'\uD83D\uDCCD '+l.label:id; };
    groupIcon='';
  } else if(checklistSort==='category'){
    groupKey=item=>item.category;
    groupOrder=getCats().map(c=>c.id);
    groupLabel=id=>{ const c=getCats().find(x=>x.id===id); return c?(c.emoji?c.emoji+' ':'')+c.label:id; };
    groupIcon='';
  } else if(checklistSort==='type'){
    groupKey=item=>item.type;
    groupOrder=['always','house','consumable','seasonal'];
    groupLabel=id=>({always:'Always in kit',house:'Bring from home',consumable:'Needs restocking',seasonal:'Seasonal'}[id]||id);
    groupIcon='';
  } else {
    groupKey=null;
  }

  // Build group map
  const groupMap={};
  if(groupKey){
    filteredCIs.forEach(({ci,item})=>{
      const k=groupKey(item);
      if(!groupMap[k]) groupMap[k]=[];
      groupMap[k].push({ci,item});
    });
  }

  // ── Active filter labels for header ──
  const filterLabels=[];
  if(checklistPersonFilter!=='all'){
    const p=S.people.find(x=>x.id===checklistPersonFilter);
    if(p) filterLabels.push((p.emoji||'\uD83D\uDC64')+' '+p.name);
  }
  if(checklistLocFilter!=='all'){
    const l=getStorageLocs().find(x=>x.id===checklistLocFilter);
    if(l) filterLabels.push('\uD83D\uDCCD '+l.label);
  }
  if(checklistHidePacked) filterLabels.push('Unpacked only');

  // ── Trip meta ──
  const chips=[
    trip.nights+'n',
    ({summer:'Summer',shoulder:'Shoulder',winter:'Winter'}[trip.season]||''),
    ({hookup:'Full hookup',basic:'Basic',wild:'Wild camping'}[trip.site]||''),
    ({local:'Local',regional:'Regional',remote:'Remote'}[trip.distance]||''),
    trip.dog?'\uD83D\uDC15 Dog':'',
    trip.extraPeople>0?'+'+trip.extraPeople+' people':'',
    ...(trip.activities||[])
  ].filter(Boolean);
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const totalItems=filteredCIs.length;

  // ── Build item HTML ──
  function personBadges(item){
    return (S.people||[]).filter(p=>(item.personIds||[]).includes(p.id))
      .map(p=>`<span style="display:inline-block;font-family:sans-serif;font-size:6.5pt;font-weight:700;padding:0.5pt 4pt;border-radius:8pt;background:${p.color}22;color:${p.color};border:0.5pt solid ${p.color}55;margin-left:3pt">${p.name}</span>`)
      .join('');
  }

  function stateIndicator(state){
    if(state==='packed') return '<span style="color:#4a6b3a;font-size:9pt;margin-right:3pt">&#x2713;</span>';
    if(state==='ready')  return '<span style="color:#9a6820;font-size:9pt;margin-right:3pt">&#x25CB;</span>';
    return '<span style="display:inline-block;width:10pt;height:10pt;border:1pt solid #1a1a12;border-radius:1pt;margin-right:3pt;vertical-align:middle"></span>';
  }

  function buildItems(items){
    return items.map(({ci,item})=>{
      const subs=subItems(item.id).filter(s=>s.type!=='wishlist');
      const acts=(item.actions||[]).filter(a=>actionStages.includes(a.stage));
      const route=item.packsInto&&item.packsInto!==item.location?' \u2192 '+(locMap[item.packsInto]||item.packsInto):'';
      const meta=[locMap[item.location]||item.location,route?route.trim():'',item.notes||''].filter(Boolean).join(' \u00B7 ');
      const packed=ci.state==='packed';
      return `<div class="item${packed?' item-packed':''}">
        <div class="item-main">
          ${stateIndicator(ci.state)}
          <div class="item-body">
            <div class="item-name">${esc(item.name)}${personBadges(item)}</div>
            ${meta?`<div class="item-meta">${esc(meta)}</div>`:''}
            ${!packed?'<div class="notes-line"></div>':''}
          </div>
        </div>
        ${subs.map(s=>`
        <div class="sub-item">
          ${stateIndicator((trip.checklist||[]).find(c=>c.itemId===s.id)?.state||'unchecked')}
          <div class="item-body">
            <div class="item-name sub-name">${esc(s.name)}${personBadges(s)}</div>
            ${s.notes?`<div class="item-meta">${esc(s.notes)}</div>`:''}
          </div>
        </div>`).join('')}
        ${acts.map(a=>{
          const done=!!(trip.actionStates||{})[item.id+'::'+a.id];
          return `<div class="action-row${done?' action-done':''}">
            <span style="display:inline-block;width:8pt;height:8pt;border:0.75pt solid #9a7040;border-radius:1pt;margin-right:4pt;vertical-align:middle;${done?'background:#9a7040':''}">${done?'<span style=\'color:#fff;font-size:7pt;line-height:8pt;display:block;text-align:center\'>\u2713</span>':''}</span>
            <span class="action-stage">${STAGE_LABELS[a.stage]&&STAGE_LABELS[a.stage].icon?STAGE_LABELS[a.stage].icon+' ':''}</span>
            <span class="action-label">${esc(a.label)}</span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  }

  // ── Build sections ──
  function buildSections(){
    if(!groupKey){
      // Flat list — no section headers
      return `<div class="section">${buildItems(filteredCIs)}</div>`;
    }
    return (groupOrder||[]).filter(k=>groupMap[k]?.length).map(k=>`
      <div class="section">
        <div class="section-header">
          <span class="section-title">${groupLabel(k)}</span>
          <span class="section-count">${groupMap[k].length} item${groupMap[k].length!==1?'s':''}</span>
        </div>
        ${buildItems(groupMap[k])}
      </div>`).join('');
  }

  // ── Full document ──
  const html=`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${esc(listTitle)} \u2014 ${esc(trip.name)}</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    --ink:#1a1a12;--ink-l:#4a4a38;--ink-f:#8a8a74;

    --accent:#6b4c1e;--accent-l:#9a7040;--green:#4a6b3a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--paper);color:var(--ink);font-size:9.5pt;line-height:1.35}

  /* COVER — compact horizontal strip */
  .cover{background:var(--ink);color:var(--paper);padding:6mm 14mm 5mm;display:flex;align-items:center;gap:10pt}
  .cover-deco{font-size:30pt;opacity:.15;flex-shrink:0;line-height:1}
  .cover-left{flex:1}
  .cover-label{font-family:'Barlow Condensed',sans-serif;font-size:6.5pt;letter-spacing:.25em;text-transform:uppercase;color:var(--paper-r);margin-bottom:1pt}
  .cover-title{font-family:'Barlow Condensed',sans-serif;font-size:16pt;font-weight:800;letter-spacing:.06em;text-transform:uppercase;line-height:1;margin-bottom:1pt}
  .cover-mode{font-family:'Barlow Condensed',sans-serif;font-size:9pt;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-l);margin-bottom:3pt}

  .statsbar{background:var(--paper-d);border-bottom:1pt solid var(--paper-r);padding:2pt 14mm;display:flex;gap:14pt;align-items:center}

  .item{padding:3pt 0 1pt;border-bottom:.5pt solid var(--paper-r);break-inside:avoid;page-break-inside:avoid}

  }
</style>

<div class="cover">

// ── LIGHT MODE ──
function toggleLightMode(){
  const isLight=document.body.classList.toggle('light');
  localStorage.setItem('basecamp_theme', isLight?'light':'dark');
  document.getElementById('lightBtn').textContent=isLight?'🌙':'☀️';
  document.getElementById('lightBtn').title=isLight?'Switch to dark mode':'Switch to light mode';
}

function initTheme(){
  const saved=localStorage.getItem('basecamp_theme');
  // Default is now LIGHT — dark is the option
  const useDark=saved?saved==='dark':false;
  if(!useDark){
    document.body.classList.add('light');
    document.getElementById('lightBtn').textContent='🌙';
    document.getElementById('lightBtn').title='Switch to dark mode';
  } else {
    document.getElementById('lightBtn').title='Switch to light mode';
  }
}
